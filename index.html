<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Painel de KPIs — Grau Técnico FSA</title>
<style>
  :root{
    --verde:#0d4420; --verde2:#16653a; --tinta:#1f2a24; --cinza:#6b7a72;
    --linha:#e6ece8; --fundo:#f4f7f5; --card:#ffffff;
    --ok:#2f9e44; --warn:#e8a200; --bad:#e03131;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--fundo);color:var(--tinta);-webkit-text-size-adjust:100%}
  .wrap{max-width:1080px;margin:0 auto;padding:0 14px 60px}
  /* Header */
  header{background:linear-gradient(110deg,var(--verde),var(--verde2));color:#fff;padding:18px 0}
  .head-in{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{font-weight:800;font-size:20px;letter-spacing:.5px;line-height:1}
  .logo small{display:block;font-size:9px;font-weight:600;letter-spacing:2px;opacity:.85}
  .htxt .k{font-size:10px;letter-spacing:2.5px;opacity:.8;font-weight:600}
  .htxt .t{font-size:18px;font-weight:700;margin-top:2px}
  .hr-right{text-align:right;font-size:11px}
  .hr-right .u{font-weight:700;font-size:13px;letter-spacing:1px}
  .cloud{margin-top:4px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%}
  /* Tabs */
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 2px 6px;-webkit-overflow-scrolling:touch}
  .tab{border:none;cursor:pointer;white-space:nowrap;padding:9px 16px;border-radius:999px;font-weight:700;font-size:14px;background:#fff;color:#445;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:.15s}
  .tab.active{color:#fff}
  /* Cards */
  .card{background:var(--card);border:1px solid var(--linha);border-radius:16px;padding:16px 16px;margin-top:14px}
  .card h2{margin:0 0 2px;font-size:15px;display:flex;align-items:center;gap:8px}
  .muted{color:var(--cinza);font-size:12.5px;margin:2px 0 0}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}}
  /* Date + inputs */
  label.fl{font-size:11px;font-weight:700;color:var(--cinza);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px}
  input,select{font-family:inherit;font-size:14px;padding:9px 10px;border:1.5px solid var(--linha);border-radius:10px;background:#fff;color:var(--tinta);width:100%}
  input:focus,select:focus{outline:none;border-color:var(--verde2)}
  input:disabled{background:#f6f8f6;color:#9aa7a0}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px}
  /* Config rows */
  .cfg{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--linha);border-radius:12px;margin-top:8px}
  .cfg input.nm{flex:1;min-width:120px}
  .cfg .mae{cursor:pointer;font-size:18px;background:none;border:none;line-height:1}
  .cfg input.mt{width:90px;flex:none;text-align:center}
  .cfg .tag{font-size:10px;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:6px;background:#eef2ef;color:#6b7a72;flex:none}
  .cfg .rm{cursor:pointer;border:none;background:#fdecec;color:#c0392b;width:30px;height:30px;border-radius:8px;font-weight:700;flex:none}
  .add{margin-top:10px;width:100%;border:1.5px dashed #cdd6cf;background:#fafcfa;color:#566;padding:10px;border-radius:12px;font-weight:700;cursor:pointer}
  /* Gauge / KPI */
  .mae-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.mae-grid{grid-template-columns:1fr}}
  .gauge-card{border:1px solid var(--linha);border-radius:14px;padding:14px;text-align:center;position:relative}
  .gauge-big{font-size:26px;font-weight:800;margin-top:-6px}
  .gauge-sub{font-size:12px;color:var(--cinza)}
  .therm{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;margin-top:6px}
  .sub-card{border:1px solid var(--linha);border-radius:14px;padding:12px}
  .sub-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .sub-name{font-weight:700;font-size:13.5px}
  .sub-vals{display:flex;gap:14px;margin-top:6px}
  .sub-vals div{font-size:11px;color:var(--cinza)}
  .sub-vals b{display:block;font-size:16px;color:var(--tinta)}
  .bars{display:flex;align-items:flex-end;gap:5px;height:64px;margin-top:6px}
  .bcol{flex:1;display:flex;flex-direction:column;align-items:center}
  .bwrap{height:44px;width:100%;display:flex;align-items:flex-end;justify-content:center}
  .bar{width:100%;max-width:26px;border-radius:4px 4px 2px 2px;min-height:4px;transition:height .3s}
  .blab{font-size:10px;color:#9aa7a0;margin-top:5px;font-weight:600}
  .alert{border-left:4px solid var(--warn);background:#fff9eb;border-radius:10px;padding:10px 12px;margin-top:8px;font-size:13px}
  .alert b{display:block;font-size:11px;color:#9a7700;text-transform:uppercase;letter-spacing:.5px}
  /* info button */
  .i{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:#e7ece8;color:#5b6b62;font-size:11px;font-weight:800;cursor:pointer;border:none;font-style:normal;flex:none}
  .pop{position:fixed;z-index:50;max-width:320px;background:#1f2a24;color:#fff;font-size:12px;line-height:1.5;padding:12px 14px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);display:none}
  .pop b{color:#a9e6c0}
  .pop .f{display:block;background:rgba(255,255,255,.1);border-radius:6px;padding:6px 8px;margin:6px 0;font-family:ui-monospace,Menlo,monospace;font-size:11px;white-space:pre-wrap}
  /* unit ranking */
  .rank{display:flex;align-items:center;gap:10px;margin-top:10px}
  .rank .nm{width:96px;font-size:12.5px;font-weight:700;flex:none}
  .rank .bar{flex:1;height:18px;background:#eef2ef;border-radius:9px;overflow:hidden}
  .rank .fill{height:100%;border-radius:9px;transition:width .4s}
  .rank .pc{width:46px;text-align:right;font-size:12.5px;font-weight:800;flex:none}
  .empty{color:var(--cinza);font-size:13px;text-align:center;padding:18px}
  .btn-ghost{border:1.5px solid var(--linha);background:#fff;border-radius:10px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer;color:#566}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;color:var(--cinza)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  footer{ text-align:center;color:#9aa7a0;font-size:11px;margin-top:26px}

  /* ===== NOVOS COMPONENTES v5 ===== */
  /* Banner da trava de compliance */
  .lockbar{border-radius:14px;padding:13px 15px;margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid}
  .lockbar .lb-ic{font-size:22px;line-height:1}
  .lockbar .lb-tx{flex:1;min-width:180px}
  .lockbar .lb-tit{font-weight:800;font-size:14px}
  .lockbar .lb-sub{font-size:12px;margin-top:2px;opacity:.9}
  .lockbar.ok{background:#eafaf0;border-color:#bfe9cd;color:#13692f}
  .lockbar.warn{background:#fff8e8;border-color:#f0dca0;color:#8a6d00}
  .lockbar.bad{background:#fdeeee;border-color:#f3c0c0;color:#a81f1f}
  .lockbar.hard{background:#fbe4e4;border-color:#e88f8f;color:#8f1414}
  .lockbar .lb-btn{border:none;border-radius:10px;padding:9px 14px;font-weight:800;font-size:13px;cursor:pointer;background:#8f1414;color:#fff}
  .lockbar .lb-btn.alt{background:#13692f}
  .ro-note{background:#eef2f6;border:1px solid #d8e2ea;color:#4a5a68;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-top:10px}
  .jban{background:#fff4e5;border:1px solid #f0c98a;color:#7a4a00;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:600;line-height:1.4;margin-bottom:12px}
  .warnbox{background:#fbf1f1;border:1px solid #e6c3c3;color:#7a3030;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:600;line-height:1.4;margin-top:10px}
  .htab{width:100%;border-collapse:collapse;font-size:12.5px}
  .htab th,.htab td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--linha);white-space:nowrap}
  .htab th:first-child,.htab td:first-child{text-align:left}
  .htab thead th{color:var(--cinza);font-size:11px;text-transform:uppercase;letter-spacing:.02em}
  /* Toggle booleano (✓/✗) */
  .toggle{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--linha);border-radius:10px;padding:9px 12px;cursor:pointer;font-weight:700;font-size:13px;width:100%;background:#fff;color:#566;user-select:none}
  .toggle .box{width:20px;height:20px;border-radius:6px;border:2px solid #cdd6cf;display:inline-flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex:none}
  .toggle.on{border-color:var(--ok);color:var(--ok);background:#f0faf3}
  .toggle.on .box{background:var(--ok);border-color:var(--ok)}
  .toggle.off .box{background:#fff}
  .toggle[aria-disabled="true"]{opacity:.55;cursor:not-allowed}
  /* Checklist status (Secretaria) */
  .chk{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;border:1px solid var(--linha);color:#566;background:#fff}
  .chip.yes{background:#f0faf3;border-color:#bfe9cd;color:#13692f}
  .chip.no{background:#fdeeee;border-color:#f3c0c0;color:#a81f1f}
  /* Compare bars (ENF/RAD, turnos) */
  .cmp{margin-top:8px}
  .cmp-row{display:flex;align-items:center;gap:10px;margin-top:7px}
  .cmp-lab{width:62px;font-size:12px;font-weight:700;color:#566;flex:none}
  .cmp-track{flex:1;height:16px;background:#eef2ef;border-radius:8px;overflow:hidden}
  .cmp-fill{height:100%;border-radius:8px;transition:width .4s}
  .cmp-val{width:54px;text-align:right;font-size:12.5px;font-weight:800;flex:none}
  /* Scorecards estado/cadastro */
  .score{border:1px solid var(--linha);border-radius:12px;padding:11px 12px;text-align:center}
  .score .sv{font-size:20px;font-weight:800}
  .score .sl{font-size:11px;color:var(--cinza);margin-top:2px;line-height:1.25}
  /* Big number derivado */
  .big{border:1px solid var(--linha);border-radius:12px;padding:12px;text-align:center}
  .big .bv{font-size:20px;font-weight:800}
  .big .bl{font-size:11px;color:var(--cinza);margin-top:3px;display:flex;align-items:center;justify-content:center;gap:5px}
  /* Group header no lançamento */
  .ghead{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#7a8a82;margin:14px 0 2px;grid-column:1/-1}
  .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:6px;background:#e7ece8;color:#5b6b62;margin-left:6px}
</style>
</head>
<body>
<header>
  <div class="head-in">
    <div class="brand">
      <div class="logo">grau<small>TÉCNICO</small></div>
      <div class="htxt">
        <div class="k">PAINEL DIÁRIO INTERATIVO</div>
        <div class="t">Controle de KPIs por Setor</div>
      </div>
    </div>
    <div class="hr-right">
      <div class="u">UNIDADE · FEIRA DE SANTANA / BA</div>
      <div class="cloud"><span class="dot" id="cloudDot"></span><span id="cloudTxt">Conectando…</span></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
  <footer>Painel de KPIs · Grau Técnico FSA — dados salvos neste aparelho e sincronizados quando a nuvem está ativa.</footer>
</div>

<div class="pop" id="pop"></div>

<!-- Firebase (compat) — opcional; o app funciona mesmo sem ele -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
"use strict";
/* ====================== CONFIG ====================== */
const FB = { apiKey:"AIzaSyDywBw1M0yc0xmzfdMnMMRhsxwR-9egzug", authDomain:"kpisenviodiariosetores.firebaseapp.com", projectId:"kpisenviodiariosetores", storageBucket:"kpisenviodiariosetores.firebasestorage.app", messagingSenderId:"284852960161", appId:"1:284852960161:web:9c0114f35f11609800a9e0" };
const LS_KEY = "gt_kpi_v5";
const DOC_ID = "feira-santana";

/* ====================== MODELO DE DADOS (data-driven) ======================
   Cada campo tem: key,label,type,nat (+ opcionais g,dir,meta,sub,grupo,snap,kind,src,src2,src3,srcs,flag)
   type : num | money | pct | text | bool
   nat  : diario | acum | estado | semanal | mensal | alerta | deriv
   g    : 1 (★ alimenta a Unidade) | 2  -> é medidor (meta-mãe)
   dir  : "down" quando menor é melhor (default "up")
   meta : alvo numérico (medidores e ritmo)
   sub  : grupo de comparação (enf/rad/noite/manha/tarde)
   grupo: cabeçalho no lançamento
   snap : true -> valor do dia (NÃO soma no mês)  [saldos]
   kind : tipo de derivado (ver computeDeriv)
*/
const DEFAULTS = [
 {id:"comercial",name:"Comercial",color:"#2E75B6",fields:[
   {key:"visitas", label:"Visitas agendadas",        type:"num",  nat:"diario"},
   {key:"faladas", label:"Atendimentos comerciais",  type:"num",  nat:"diario"},
   {key:"matgt",   label:"Matrículas Grau Técnico",  type:"num",  nat:"acum", g:1, meta:30},
   {key:"matgp",   label:"Matrículas Grau P",        type:"num",  nat:"acum", meta:20},
   {key:"conv",    label:"Conversão GT (%)",         type:"pct",  nat:"deriv", g:2, meta:25, kind:"ratio_pct", src:"matgt", src2:"visitas"},
   {key:"mattot",  label:"Matrículas totais",        type:"num",  nat:"deriv", kind:"sum", srcs:["matgt","matgp"]},
   {key:"ritmogt", label:"Ritmo necessário GT",      type:"num",  nat:"deriv", kind:"ritmo", src:"matgt", meta:30},
   {key:"cac",     label:"Perdidos por CAC (alunos)", type:"num",  nat:"estado", dir:"down", grupo:"Cascata de perda — motivo do Comercial"},
   {key:"vend",    label:"Destaque do dia (vendedor)",type:"text", nat:"alerta"}]},

 {id:"cra",name:"CRA",color:"#E67E22",fields:[
   /* fluxo diário (entram na trava) */
   {key:"ligacoes",label:"Ligações de cobrança",     type:"num",  nat:"diario"},
   {key:"acordos", label:"Acordos NOVOS no dia",      type:"num",  nat:"diario"},
   {key:"acvalor", label:"Valor dos acordos do dia (R$)",type:"money",nat:"diario"},
   {key:"recvalor",label:"Recebido no dia (R$)",      type:"money",nat:"acum", meta:50000},
   {key:"recup",   label:"Contas recuperadas (qtd, mês)",type:"num",nat:"acum"},
   /* carteira congelada (foto do dia 1) — snapshot/estado */
   {key:"cartParc",label:"Carteira do mês — parcelas",type:"num",  nat:"estado", grupo:"Carteira congelada (foto do dia 1)"},
   {key:"cartVal", label:"Carteira do mês — valor (R$)",type:"money",nat:"estado", grupo:"Carteira congelada (foto do dia 1)"},
   {key:"crProxParc",label:"A receber próximo mês — parcelas",type:"num",nat:"estado", grupo:"Carteira congelada (foto do dia 1)"},
   {key:"crProxVal",label:"A receber próximo mês — valor (R$)",type:"money",nat:"estado", grupo:"Carteira congelada (foto do dia 1)"},
   /* movimento da carteira (estado, atualiza no mês) */
   {key:"acordoVal",label:"Carteira em acordo (R$)",  type:"money",nat:"estado", grupo:"Movimento da carteira (atualiza no mês)"},
   {key:"perdaVal", label:"Perda da carteira (R$)",   type:"money",nat:"estado", dir:"down", grupo:"Movimento da carteira (atualiza no mês)"},
   {key:"recParc",  label:"Parcelas recebidas (qtd)", type:"num",  nat:"estado", grupo:"Movimento da carteira (atualiza no mês)"},
   /* Janela de Salvamento (2 parcelas, dia 1→8) */
   {key:"p2Base",  label:"A 2 parcelas — início do mês (alunos)",type:"num",nat:"estado", dir:"down", grupo:"Janela de Salvamento (2 parcelas, dia 1→8)"},
   {key:"p2Atual", label:"A 2 parcelas — saldo atual (alunos)",  type:"num",nat:"estado", dir:"down", grupo:"Janela de Salvamento (2 parcelas, dia 1→8)"},
   {key:"p2Parc",  label:"A 2 parcelas — nº de parcelas",type:"num",nat:"estado", dir:"down", grupo:"Janela de Salvamento (2 parcelas, dia 1→8)"},
   {key:"p2Val",   label:"A 2 parcelas — valor (R$)",  type:"money",nat:"estado", dir:"down", grupo:"Janela de Salvamento (2 parcelas, dia 1→8)"},
   /* LFI consumada (3 parcelas) */
   {key:"p3Alunos",label:"A 3 parcelas = LFI (alunos)",type:"num", nat:"estado", dir:"down", grupo:"Limpeza Financeira — LFI (3 parcelas)"},
   {key:"p3Parc",  label:"A 3 parcelas — nº de parcelas",type:"num",nat:"estado", dir:"down", grupo:"Limpeza Financeira — LFI (3 parcelas)"},
   {key:"p3Val",   label:"A 3 parcelas — valor (R$)",  type:"money",nat:"estado", dir:"down", grupo:"Limpeza Financeira — LFI (3 parcelas)"},
   {key:"lfi",     label:"Perdidos por LFI (alunos) — entra na cascata",type:"num",nat:"estado", dir:"down", grupo:"Limpeza Financeira — LFI (3 parcelas)"},
   /* MEDIDORES (★ e 2º) sobre carteira congelada */
   {key:"pctreceb",label:"% recebido (carteira congelada)",type:"pct",nat:"deriv", g:1, meta:90, kind:"ratio_pct", src:"recvalor", src2:"cartVal"},
   {key:"pctperda",label:"% perdido por evasão",      type:"pct",  nat:"deriv", g:2, meta:5, dir:"down", kind:"ratio_pct", src:"perdaVal", src2:"cartVal"},
   /* derivados com card dedicado (dim:true => fora do card genérico) */
   {key:"inadAtivoVal",label:"Inadimplente ativo (R$)",type:"money",nat:"deriv", dir:"down", dim:true, kind:"minus", src:"cartVal", srcs:["recvalor","acordoVal","perdaVal"]},
   {key:"pctAparente",label:"Inadimplência aparente (%)",type:"pct",nat:"deriv", dir:"down", dim:true, kind:"aparente", src:"recvalor", src2:"cartVal", src3:"perdaVal"},
   {key:"ilusao",  label:"Ilusão do cancelamento (pp)",type:"num", nat:"deriv", dir:"down", dim:true, kind:"diff", src:"pctAparente", src2:"pctreceb"},
   {key:"pctrecup",label:"% recuperação na Janela",   type:"pct",  nat:"deriv", dim:true, kind:"jrecup", src:"p2Base", src2:"p2Atual"},
   {key:"pctParcReceb",label:"% parcelas recebidas",  type:"pct",  nat:"deriv", dim:true, kind:"ratio_pct", src:"recParc", src2:"cartParc"},
   {key:"ticketParc",label:"Ticket por parcela (R$)", type:"money",nat:"deriv", dim:true, kind:"ratio", src:"cartVal", src2:"cartParc"},
   {key:"ticketAt0",label:"Ticket por aluno ativo (R$)",type:"money",nat:"deriv", dim:true, kind:"ratioU", src:"cartVal", srcU:"atInicio"},
   {key:"parcPorAluno",label:"% parcelas sobre ativos",type:"pct", nat:"deriv", dim:true, kind:"ratioU_pct", src:"cartParc", srcU:"atInicio"},
   /* derivados de fluxo de acordos (card genérico) */
   {key:"ticket",  label:"Ticket médio do acordo (R$)",type:"money",nat:"deriv", kind:"ratio", src:"recvalor", src2:"acordos"},
   {key:"convac",  label:"Conversão de acordos (%)",  type:"pct",  nat:"deriv", kind:"ratio_pct", src:"acordos", src2:"ligacoes"},
   {key:"medac",   label:"Média de acordos/dia útil", type:"num",  nat:"deriv", kind:"mediadia", src:"acordos"},
   {key:"critico", label:"Aluno crítico p/ gestor",   type:"text", nat:"alerta"}]},

 {id:"pedagogico",name:"Pedagógico",color:"#4f9e34",fields:[
   {key:"faltosos",label:"Faltosos (hoje)",          type:"num",  nat:"diario", dir:"down"},
   {key:"reprov",  label:"Reprovações",              type:"num",  nat:"acum", dir:"down"},
   {key:"evnoite", label:"Evasão — noite",           type:"num",  nat:"acum", dir:"down", sub:"noite"},
   {key:"evmanha", label:"Evasão — manhã",           type:"num",  nat:"acum", dir:"down", sub:"manha"},
   {key:"evtarde", label:"Evasão — tarde",           type:"num",  nat:"acum", dir:"down", sub:"tarde"},
   {key:"ativos",  label:"Alunos ativos (total)",    type:"num",  nat:"estado"},
   {key:"alenf",   label:"Alunos ENF",               type:"num",  nat:"estado", sub:"enf"},

function emptyData(){ return {conf:{},entries:{},estado:{},lock:{},unidade:{},historico:{},cfg:{thresholds:{warn:1,bad:2,hard:3},gestorPin:"",feriados:[],diaVenc:8}}; }

/* ---- datas ---- */
function isoToday(){ const d=new Date(); return isoOf(d); }
function isoOf(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseISO(s){ const p=(s||"").split("-").map(Number); return new Date(p[0],(p[1]||1)-1,p[2]||1); }
function daysInMonth(d){ return new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); }
function monthStartISO(){ const t=refBizDate(); return isoOf(new Date(t.getFullYear(),t.getMonth(),1)); }

/* ---- accessors ---- */
function sector(id){ return DEFAULTS.find(s=>s.id===id); }
function confOf(id){ return S.data.conf[id] || (S.data.conf[id]=clone(sector(id).fields)); }
function entriesOf(id){ return S.data.entries[id] || (S.data.entries[id]={}); }
function estadoOf(id){ return S.data.estado[id] || (S.data.estado[id]={}); }
function fieldOf(id,key){ return confOf(id).find(f=>f.key===key); }
function lbl(id,key){ const f=fieldOf(id,key); return f?f.label:key; }
const ULBL={atInicio:"alunos ativos no início do mês",atConcluidos:"alunos que concluíram no mês"};
function uLbl(key){ return ULBL[key]||key; }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function num(v){ const n=Number(v); return isNaN(n)?0:n; }

/* Estrutura dos indicadores é do CÓDIGO (DEFAULTS). De dados salvos/nuvem herdamos SÓ a meta editada — nunca a estrutura,
   senão um schema antigo (na nuvem) ressuscitaria campos removidos (venc1/venc2/crvalor) e fórmulas velhas. */
function reconcileConf(stored){
  const out={};
  DEFAULTS.forEach(s=>{
    const base=clone(s.fields);
    const arr=(stored&&stored[s.id]&&Array.isArray(stored[s.id]))?stored[s.id]:null;
    if(arr){ const byKey={}; arr.forEach(f=>{ if(f&&f.key) byKey[f.key]=f; });
      base.forEach(f=>{ const sf=byKey[f.key]; if(sf&&sf.meta!=null&&isFinite(Number(sf.meta))) f.meta=Number(sf.meta); }); }
    out[s.id]=base;
  });
  return out;
}

/* ====================== PERSIST (offline-first + debounce 800ms) ====================== */
function bootData(){
  let d=emptyData();
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const p=JSON.parse(raw); d=Object.assign(emptyData(),p); } }catch(e){}
  if(!d.conf)d.conf={}; if(!d.entries)d.entries={}; if(!d.estado)d.estado={}; if(!d.lock)d.lock={};
  if(!d.unidade||typeof d.unidade!=="object")d.unidade={}; if(!d.historico||typeof d.historico!=="object")d.historico={};
  if(!d.cfg)d.cfg={}; if(!d.cfg.thresholds)d.cfg.thresholds={warn:1,bad:2,hard:3};
  if(d.cfg.gestorPin==null)d.cfg.gestorPin=""; if(!Array.isArray(d.cfg.feriados))d.cfg.feriados=[];
  if(d.cfg.diaVenc==null) d.cfg.diaVenc=8;
  if(!d.cfg.inicio) d.cfg.inicio=isoOf(new Date()); // piso da trava = 1º uso; não cobra dias úteis anteriores à instalação
  d.conf = reconcileConf(d.conf); // estrutura/medidores vêm do código; só a meta editada é preservada
  S.data=d;
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(S.data)); }catch(e){ console.warn("localStorage falhou:",e); }
  if(docRef && !applyingRemote){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{ docRef.set(S.data,{merge:true}).catch(err=>{ console.warn("Firestore negou:",err&&err.code); setCloud(err&&err.code==="permission-denied"?"denied":"off"); }); }, 800);
  }
}
function setCloud(st){ S.cloud=st; paintCloud(); }
function paintCloud(){
  const map={on:["#9fe27a","Sincronizado na nuvem"],off:["#f0b86b","Offline — salvo no aparelho"],init:["#cde3d2","Conectando…"],denied:["#f3a3a3","Sem permissão na nuvem — salvo no aparelho"]};
  const m=map[S.cloud]||map.init; const dot=document.getElementById("cloudDot"), t=document.getElementById("cloudTxt");
  if(dot)dot.style.background=m[0]; if(t)t.textContent=m[1];
}
function initCloud(tries){
  if(typeof firebase==="undefined" || !firebase.firestore){
    if(tries<20){ setTimeout(()=>initCloud(tries+1),250); } else { setCloud("off"); }
    return;
  }
  try{
    if(!firebase.apps||!firebase.apps.length) firebase.initializeApp(FB);
    db=firebase.firestore(); docRef=db.collection("paineis").doc(DOC_ID);
    setCloud("on");
    docRef.onSnapshot(snap=>{
      if(!snap.exists) return;
      const r=snap.data()||{}; applyingRemote=true;
      S.data.entries= Object.assign(S.data.entries,r.entries||{});
      S.data.estado = Object.assign(S.data.estado, r.estado||{});
      S.data.lock   = Object.assign(S.data.lock,   r.lock||{});
      if(r.unidade)  S.data.unidade  = Object.assign(S.data.unidade||{},  r.unidade);
      if(r.historico)S.data.historico= Object.assign(S.data.historico||{},r.historico);
      if(r.cfg) S.data.cfg = Object.assign(S.data.cfg, r.cfg);
      S.data.conf = reconcileConf(r.conf||S.data.conf); // estrutura do código; herda só a meta da nuvem
      try{ localStorage.setItem(LS_KEY,JSON.stringify(S.data)); }catch(e){}
      applyingRemote=false; render();
    }, err=>{ console.warn("onSnapshot:",err&&err.code); setCloud(err&&err.code==="permission-denied"?"denied":"off"); });
  }catch(e){ console.warn("initCloud:",e); setCloud("off"); }
}

/* ====================== DIAS ÚTEIS / FERIADOS ====================== */
function isBiz(d){ const wd=d.getDay(); if(wd===0||wd===6) return false; return !(S.data.cfg.feriados||[]).includes(isoOf(d)); }
function refBizDate(){ let d=new Date(); d.setHours(0,0,0,0); let g=0; while(!isBiz(d)&&g<31){ d.setDate(d.getDate()-1); g++; } return d; }
function bizElapsed(){ const t=refBizDate(); const start=new Date(t.getFullYear(),t.getMonth(),1); let c=0; const d=new Date(start); while(d<=t){ if(isBiz(d))c++; d.setDate(d.getDate()+1);} return c; }
function bizRemaining(){ const t=refBizDate(); const end=new Date(t.getFullYear(),t.getMonth()+1,0); let c=0; const d=new Date(t); d.setDate(d.getDate()+1); while(d<=end){ if(isBiz(d))c++; d.setDate(d.getDate()+1);} return c; }

/* ====================== CÁLCULOS BASE ====================== */
function monthSeries(id,key,ref){
  const e=entriesOf(id), dim=daysInMonth(ref), arr=new Array(dim).fill(null);
  for(const iso in e){ const d=parseISO(iso); if(d.getMonth()===ref.getMonth()&&d.getFullYear()===ref.getFullYear()){ const v=e[iso][key]; if(v!=null&&v!==""&&v!==true&&v!==false) arr[d.getDate()-1]=(arr[d.getDate()-1]||0)+num(v); } }
  return arr;
}
function sumMonth(id,key,ref){ return monthSeries(id,key,ref).reduce((a,b)=>a+(b||0),0); }
function dayVal(id,key,iso){ const e=entriesOf(id); const day=e[iso]||{}; const v=day[key]; if(v===true)return 1; if(v===false)return 0; return (v==null||v==="")?0:num(v); }
function weekVals(id,key,ref){
  const e=entriesOf(id), out=[]; const base=new Date(ref);
  for(let i=6;i>=0;i--){ const d=new Date(base); d.setDate(base.getDate()-i); const iso=isoOf(d); const day=e[iso]||{}; const raw=day[key]; out.push({iso,v:(raw!=null&&raw!==""&&raw!==true&&raw!==false)?num(raw):0,label:["D","S","T","Q","Q","S","S"][d.getDay()]}); }
  return out;
}

/* ====================== MOTOR DE DERIVADOS ======================
   resolveKey resolve qualquer chave (bruta ou derivada). forDate = ISO p/ snap/bool/fechamento. */
function rawVal(id,f,forDate){
  if(f.nat==="estado"||f.nat==="mensal"||f.nat==="semanal"){ const v=estadoOf(id)[f.key]; if(f.type==="bool")return v===true?1:0; return (v==null||v==="")?0:num(v); }
  if(f.type==="bool") return dayVal(id,f.key,forDate)?1:0;
  if(f.snap) return dayVal(id,f.key,forDate);
  return sumMonth(id,f.key,refBizDate()); // diario/acum numérico -> soma do mês até hoje
}
function resolveKey(id,key,forDate,depth){
  depth=depth||0; if(depth>8) return 0;
  const f=fieldOf(id,key); if(!f) return 0;
  if(f.nat==="deriv") return computeDeriv(id,f,forDate,depth+1);
  return rawVal(id,f,forDate);
}
function unidadeNum(key){ const v=(S.data.unidade||{})[key]; return (v==null||v==="")?0:num(v); }
function computeDeriv(id,f,forDate,depth){
  const R=(k)=>resolveKey(id,k,forDate,depth);
  switch(f.kind){
    case "ratio_pct":{ const a=R(f.src),b=R(f.src2); return b>0?a/b*100:0; }
    case "ratio":{ const a=R(f.src),b=R(f.src2); return b>0?a/b:0; }
    case "sum":{ return (f.srcs||[]).reduce((s,k)=>s+R(k),0); }
    case "diff":{ return R(f.src)-R(f.src2); }
    case "ritmo":{ const acc=sumMonth(id,f.src,refBizDate()); const rem=Math.max(1,bizRemaining()); return Math.max(0,(num(f.meta)-acc)/rem); }
    case "mediadia":{ const acc=sumMonth(id,f.src,refBizDate()); return acc/Math.max(1,bizElapsed()); }
    case "recup_pct":{ const a=R(f.src); const den=R(f.src2)+R(f.src3); return den>0?a/den*100:0; }
    case "evasao_pct":{ const n=(f.srcs||[]).reduce((s,k)=>s+R(k),0); const den=R(f.src2); return den>0?n/den*100:0; }
    case "pctfalt":{ const avg=sumMonth(id,f.src,refBizDate())/Math.max(1,bizElapsed()); const den=R(f.src2); return den>0?avg/den*100:0; }
    case "presenca":{ const pf=R(f.src); return Math.max(0,100-pf); }
    case "checkpct":{ const ks=f.srcs||[]; const t=ks.reduce((s,k)=>s+(dayVal(id,k,forDate)?1:0),0); return ks.length?t/ks.length*100:0; }
    case "indfech":{ const ks=f.srcs||[]; const t=ks.reduce((s,k)=>s+(dayVal(id,k,forDate)?1:0),0); return ks.length?t/ks.length*100:0; }
    case "sum_today":{ return (f.srcs||[]).reduce((s,k)=>s+dayVal(id,k,forDate),0); }
    case "minus":{ const base=R(f.src); const sub=(f.srcs||[]).reduce((s,k)=>s+R(k),0); return base-sub; }
    case "aparente":{ const a=R(f.src); const den=R(f.src2)-R(f.src3); return den>0?a/den*100:0; }
    case "jrecup":{ const b=R(f.src); return b>0?(b-R(f.src2))/b*100:0; }
    case "ratioU":{ const b=unidadeNum(f.srcU); return b>0?R(f.src)/b:0; }
    case "ratioU_pct":{ const b=unidadeNum(f.srcU); return b>0?R(f.src)/b*100:0; }
    default: return 0;
  }
}

/* ====================== SCORE / COR ====================== */
function colorFor(pc){ return pc>=100?"var(--ok)":pc>=80?"var(--warn)":"var(--bad)"; }
function gaugeScore(id,f){
  const today=isoToday(), ref=refBizDate(), meta=num(f.meta);
  if(f.nat==="acum"){ const tr=accTrend(id,f.key,ref,meta); const pc=meta>0?tr.proj/meta*100:0; return {pc:Math.min(150,pc), proj:tr.proj, acc:tr.acc, mode:"proj"}; }
  // deriv / pct instantâneo
  const fd = FECH_KINDS.includes(f.kind)? today : today;
  const v=resolveKey(id,f.key,fd);
  let pc;
  if(f.dir==="down") pc = v<=0?150:(meta>0?meta/v*100:0);
  else pc = meta>0?v/meta*100:0;
  return {pc:Math.min(150,pc), val:v, mode:"inst"};
}
function accTrend(id,key,ref,meta){
  const ser=monthSeries(id,key,ref); const today=refBizDate().getDate(); const dim=daysInMonth(ref);
  let acc=0; const pts=[];
  for(let i=0;i<today;i++){ acc+=(ser[i]||0); pts.push([i+1,acc]); }
  let proj=acc;
  if(pts.length>=2){
    const n=pts.length; let sx=0,sy=0,sxy=0,sxx=0;
    pts.forEach(([x,y])=>{ sx+=x;sy+=y;sxy+=x*y;sxx+=x*x; });
    const den=(n*sxx - sx*sx); const m=den!==0?(n*sxy - sx*sy)/den:0; const b=(sy - m*sx)/n;
    proj=m*dim+b; if(proj<acc)proj=acc;
  }
  return {proj,acc};
}
function thermLabel(pc,mode){ const ok=pc>=100,near=pc>=80; if(mode==="proj")return ok?"Tendência bate a meta":near?"Tendência perto da meta":"Tendência abaixo da meta"; return ok?"Na meta":near?"Perto da meta":"Abaixo da meta"; }
function sectorStar(id){ const g1=confOf(id).find(f=>f.g===1); return g1?gaugeScore(id,g1).pc:0; }
function sectorHealth(id){ const gs=confOf(id).filter(f=>f.g).sort((a,b)=>a.g-b.g).slice(0,2); if(!gs.length)return 0; return gs.reduce((a,f)=>a+gaugeScore(id,f).pc,0)/gs.length; }

/* ====================== FORMATAÇÃO ====================== */
function fmt(v){ if(v==null||v==="")return "–"; const n=Number(v); if(isNaN(n))return v; return (Math.round(n*100)/100).toLocaleString("pt-BR"); }
function fmtT(v,type){ if(v==null||v==="")return "–"; if(type==="money")return "R$ "+fmt(v); if(type==="pct")return fmt(v)+"%"; return fmt(v); }
function fmtBoolDay(id,key,iso){ return dayVal(id,key,iso)?"Sim":"Não"; }

/* ====================== SVG / CHARTS (reaproveitados do original) ====================== */
function gaugeSVG(pc,color){
  const p=Math.max(0,Math.min(100,pc)); const r=52; const circ=Math.PI*r; const off=circ*(1-p/100);
  return `<svg width="130" height="78" viewBox="0 0 120 70">
    <path d="M8,60 A52,52 0 0 1 112,60" fill="none" stroke="#eef2ef" stroke-width="11" stroke-linecap="round"/>
    <path d="M8,60 A52,52 0 0 1 112,60" fill="none" stroke="${color}" stroke-width="11" stroke-linecap="round"
      stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
  </svg>`;
}
function barsHTML(vals,color){
  const max=Math.max(1,...vals.map(d=>d.v));
  let h='<div class="bars">';
  vals.forEach((d,i)=>{ const bh=Math.max(4,Math.round((d.v/max)*44)); const today=i===vals.length-1;
    h+=`<div class="bcol"><div class="bwrap"><div class="bar" style="height:${bh}px;background:${today?color:'#cfe0c6'}"></div></div><div class="blab">${d.label}</div></div>`; });
  return h+'</div>';
}
function sparkSVG(vals,color){
  const w=200,h=40; const max=Math.max(1,...vals); const step=vals.length>1?w/(vals.length-1):w;
  const pts=vals.map((v,i)=>`${(i*step).toFixed(1)},${(h-4-(v/max)*(h-8)).toFixed(1)}`).join(" ");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function compareBars(items,color){

function iDeriv(id,f,forDate){
  const R=(k)=>resolveKey(id,f.src?f.src:k,forDate);
  const v=resolveKey(id,f.key,forDate);
  let head="<b>"+f.label+"</b>"; let body="";
  switch(f.kind){
    case "ratio_pct":{ const a=resolveKey(id,f.src,forDate),b=resolveKey(id,f.src2,forDate); body=`${lbl(id,f.src)} ÷ ${lbl(id,f.src2)} × 100<span class="f">${fmt(a)} ÷ ${fmt(b)} × 100 = ${fmt(v)}%</span>`; break; }
    case "ratio":{ const a=resolveKey(id,f.src,forDate),b=resolveKey(id,f.src2,forDate); body=`${lbl(id,f.src)} ÷ ${lbl(id,f.src2)}<span class="f">${fmt(a)} ÷ ${fmt(b)} = ${fmt(v)}</span>`; break; }
    case "sum":{ const parts=(f.srcs||[]).map(k=>lbl(id,k)).join(" + "); const nums=(f.srcs||[]).map(k=>fmt(resolveKey(id,k,forDate))).join(" + "); body=`${parts}<span class="f">${nums} = ${fmt(v)}</span>`; break; }
    case "diff":{ const a=resolveKey(id,f.src,forDate),b=resolveKey(id,f.src2,forDate); body=`${lbl(id,f.src)} − ${lbl(id,f.src2)}<span class="f">${fmt(a)} − ${fmt(b)} = ${fmt(v)}</span>`; break; }
    case "ritmo":{ const acc=sumMonth(id,f.src,refBizDate()); const rem=Math.max(1,bizRemaining()); body=`(meta − acumulado) ÷ dias úteis restantes<span class="f">(${fmt(f.meta)} − ${fmt(acc)}) ÷ ${rem} = ${fmt(v)}/dia útil</span>`; break; }
    case "mediadia":{ const acc=sumMonth(id,f.src,refBizDate()); body=`acumulado ÷ dias úteis decorridos<span class="f">${fmt(acc)} ÷ ${Math.max(1,bizElapsed())} = ${fmt(v)}</span>`; break; }
    case "recup_pct":{ const a=resolveKey(id,f.src,forDate),b=resolveKey(id,f.src2,forDate),c=resolveKey(id,f.src3,forDate); body=`${lbl(id,f.src)} ÷ (${lbl(id,f.src2)} + ${lbl(id,f.src3)}) × 100<span class="f">${fmt(a)} ÷ (${fmt(b)} + ${fmt(c)}) × 100 = ${fmt(v)}%</span>`; break; }
    case "evasao_pct":{ const n=(f.srcs||[]).reduce((s,k)=>s+resolveKey(id,k,forDate),0); const den=resolveKey(id,f.src2,forDate); body=`(evasão dos turnos) ÷ alunos ativos × 100<span class="f">${fmt(n)} ÷ ${fmt(den)} × 100 = ${fmt(v)}%</span>`; break; }
    case "pctfalt":{ const acc=sumMonth(id,f.src,refBizDate()); const avg=acc/Math.max(1,bizElapsed()); const den=resolveKey(id,f.src2,forDate); body=`média de faltosos/dia ÷ ativos × 100<span class="f">(${fmt(acc)} ÷ ${Math.max(1,bizElapsed())}) ÷ ${fmt(den)} × 100 = ${fmt(v)}%</span>`; break; }
    case "presenca":{ const pf=resolveKey(id,f.src,forDate); body=`100 − % faltosos<span class="f">100 − ${fmt(pf)} = ${fmt(v)}%</span>`; break; }
    case "checkpct":{ const ks=f.srcs||[]; const t=ks.reduce((s,k)=>s+(dayVal(id,k,forDate)?1:0),0); body=`itens marcados ÷ total × 100 (do dia)<span class="f">${t} ÷ ${ks.length} × 100 = ${fmt(v)}%</span>`; break; }
    case "indfech":{ const ks=f.srcs||[]; const t=ks.reduce((s,k)=>s+(dayVal(id,k,forDate)?1:0),0); body=`(4 livros + 4 conciliações + DRE) conferidos ÷ 9 × 100<span class="f">${t} ÷ 9 × 100 = ${fmt(v)}%</span>`; break; }
    case "sum_today":{ const nums=(f.srcs||[]).map(k=>fmt(dayVal(id,k,forDate))).join(" + "); body=`soma dos saldos do dia<span class="f">${nums} = ${fmtT(v,'money')}</span>`; break; }
    case "minus":{ const base=resolveKey(id,f.src,forDate); const parts=(f.srcs||[]).map(k=>lbl(id,k)).join(" + "); const nums=(f.srcs||[]).map(k=>fmtT(resolveKey(id,k,forDate),'money')).join(" + "); body=`${lbl(id,f.src)} − (${parts})<span class="f">${fmtT(base,'money')} − (${nums}) = ${fmtT(v,'money')}</span>${v<0?'<span class="f" style="color:var(--bad)">⚠ negativo: os valores informados excedem a carteira — revise recebido/acordo/perda</span>':''}`; break; }
    case "aparente":{ const a=resolveKey(id,f.src,forDate),b=resolveKey(id,f.src2,forDate),c=resolveKey(id,f.src3,forDate); body=`${lbl(id,f.src)} ÷ (${lbl(id,f.src2)} − ${lbl(id,f.src3)}) × 100<span class="f">${fmtT(a,'money')} ÷ (${fmtT(b,'money')} − ${fmtT(c,'money')}) × 100 = ${fmt(v)}%</span><span class="f">denominador exclui a perda já consumada → infla o % recebido (a "ilusão")</span>`; break; }
    case "jrecup":{ const b=resolveKey(id,f.src,forDate),at=resolveKey(id,f.src2,forDate); body=`(${lbl(id,f.src)} − ${lbl(id,f.src2)}) ÷ ${lbl(id,f.src)} × 100<span class="f">(${fmt(b)} − ${fmt(at)}) ÷ ${fmt(b)} × 100 = ${fmt(v)}%</span><span class="f">quantos da Janela já saíram do risco de 2 parcelas</span>`; break; }
    case "ratioU":{ const a=resolveKey(id,f.src,forDate),b=unidadeNum(f.srcU); body=`${lbl(id,f.src)} ÷ ${uLbl(f.srcU)}<span class="f">${fmtT(a,'money')} ÷ ${fmt(b)} = ${fmtT(v,'money')}</span>${b<=0?'<span class="f">informe '+uLbl(f.srcU)+' na aba Unidade</span>':''}`; break; }
    case "ratioU_pct":{ const a=resolveKey(id,f.src,forDate),b=unidadeNum(f.srcU); body=`${lbl(id,f.src)} ÷ ${uLbl(f.srcU)} × 100<span class="f">${fmt(a)} ÷ ${fmt(b)} × 100 = ${fmt(v)}%</span>${b<=0?'<span class="f">informe '+uLbl(f.srcU)+' na aba Unidade</span>':''}`; break; }
    default: body=`Valor atual: ${fmt(v)}`;
  }
  return head+"<br>"+body;
}
function iGauge(id,f){
  const ref=refBizDate(), today=isoToday();
  if(f.nat==="acum"){ const tr=accTrend(id,f.key,ref,num(f.meta)); return `<b>${f.label}</b><br>Acumulado do mês e projeção pela reta dos dias úteis.<span class="f">soma ÷ meta × 100\nprojeção = reta × ${daysInMonth(ref)} dias\nacum.: ${fmtT(tr.acc,f.type)} · proj.: ${fmtT(Math.round(tr.proj),f.type)} · meta ${fmtT(f.meta,f.type)}</span>`; }
  return iDeriv(id,f,today)+`<span class="f">meta: ${fmtT(f.meta,f.type)}${f.dir==="down"?" (quanto menor, melhor)":""}</span>`;
}

/* ====================== TRAVA DE COMPLIANCE (local-first) ====================== */
function dailyKeys(id){ return confOf(id).filter(f=>["diario","acum"].includes(f.nat) && f.type!=="text"); }
function reported(id,iso){
  const day=entriesOf(id)[iso]; if(!day) return false;
  return dailyKeys(id).some(f=>{ const v=day[f.key]; if(f.type==="bool") return v===true; if(v===undefined||v===null||v==="") return false; return isFinite(num(v)); });
}
function lockStatus(id){
  const today=refBizDate(); const todayISO=isoOf(today); let start=new Date(today.getFullYear(),today.getMonth(),1);
  const ini=(S.data.cfg&&S.data.cfg.inicio)?parseISO(S.data.cfg.inicio):null; if(ini&&ini>start) start=new Date(ini.getFullYear(),ini.getMonth(),ini.getDate());
  const missing=[]; const d=new Date(start);
  while(d<=today){ if(isBiz(d)){ const iso=isoOf(d); if(!reported(id,iso)) missing.push(iso); } d.setDate(d.getDate()+1); }
  const openISO = missing.length? missing[0] : todayISO;
  const backlog = missing.filter(iso=>iso<todayISO).length;
  const th=S.data.cfg.thresholds||{warn:1,bad:2,hard:3};
  let status;
  if(backlog>=th.hard) status="hard";
  else if(backlog>=th.bad) status="bad";
  else if(backlog>=th.warn) status="warn";
  else status = reported(id,todayISO)?"ok":"open";
  const released=!!(S.data.lock[id]&&S.data.lock[id].released);
  return {status,gap:backlog,missing,openISO,refISO:todayISO,todayDone:reported(id,todayISO),released};
}
function canEdit(id,iso){ const st=lockStatus(id); if(iso!==st.openISO) return false; if(iso>st.refISO) return false; if(st.status==="hard" && !st.released) return false; return true; }
function normalizeLocks(){ DEFAULTS.forEach(s=>{ if(!S.data.lock[s.id])S.data.lock[s.id]={}; const st=lockStatus(s.id); if(st.gap===0 && S.data.lock[s.id].released){ S.data.lock[s.id].released=false; } }); }

  else if(st.status==="warn"){ ic="⚠️"; tit="1 dia útil em atraso"; sub=`Pendente: ${st.missing.filter(x=>x<st.refISO).map(brISO).join(", ")}. Comece pelo dia aberto (${brISO(st.openISO)}).`; }
  else if(st.status==="bad"){ ic="⛔"; tit=`${st.gap} dias úteis em atraso`; sub=`Pendentes: ${st.missing.filter(x=>x<st.refISO).map(brISO).join(", ")}. O lançamento de hoje fica bloqueado até zerar o atraso.`; }
  else if(st.status==="hard"){ ic="🔒"; tit=`Setor TRAVADO — ${st.gap} dias úteis em atraso`; sub = st.released? "Liberado pelo gestor neste aparelho. Lance os dias pendentes." : `Lançamento bloqueado. Apenas o gestor libera (PIN). Pendentes: ${st.missing.filter(x=>x<st.refISO).map(brISO).join(", ")}.`; }
  let btn="";
  if(st.status==="hard" && !st.released){ btn=`<button class="lb-btn" onclick="releaseLock('${id}')">🔑 Liberar (gestor)</button>`; }
  const cave = st.status==="hard" ? `<div class="lb-sub" style="opacity:.75;margin-top:6px">A liberação vale só neste aparelho (Fase 1). O dia em falta continua marcado como buraco na auditoria mesmo após liberar.</div>` : "";
  return `<div class="lockbar ${style}"><div class="lb-ic">${ic}</div><div class="lb-tx"><div class="lb-tit">${tit}</div><div class="lb-sub">${sub}</div>${cave}</div>${btn}</div>`;
}

      ${gaugeSVG(Math.min(100,sc.pc),sec.color)}
      <div class="gauge-big" style="color:${sec.color}">${disp}</div>
      <div class="gauge-sub">meta: ${fmtT(f.meta,f.type)} · ${pc}%${f.dir==="down"?" · menor=melhor":""}</div>
      <div class="therm" style="background:${col}22;color:${col}">● ${thermLabel(sc.pc,sc.mode)}</div>
      ${extra}
    </div>`;
  });

  /* derivados (não-medidor) */
  let dHTML="";
  derivsNG.forEach(f=>{ const fd=FECH_KINDS.includes(f.kind)?fdFech:today; const v=resolveKey(id,f.key,fd); dHTML+=bigCard(`<span style="color:${sec.color}">${fmtT(v,f.type)}</span>`, f.label, iBtn(iDeriv(id,f,fd))); });

  /* submetas (barras 7 dias) */
  let subHTML="";
  submetas.forEach(f=>{ const ref=parseISO(S.date); const wv=weekVals(id,f.key,ref), mes=sumMonth(id,f.key,refBizDate());
    const iH=`<b>${f.label}</b><br>Barras = últimos 7 dias.<span class="f">Semana = soma de 7 dias · Mês = soma do mês\nhoje ${fmtT(dayVal(id,f.key,S.date),f.type)} · semana ${fmtT(wv.reduce((a,b)=>a+b.v,0),f.type)} · mês ${fmtT(mes,f.type)}</span>`;
    subHTML+=`<div class="sub-card"><div class="sub-top"><span class="sub-name">${f.label}</span>${iBtn(iH)}</div>${barsHTML(wv,sec.color)}<div class="sub-vals"><div>HOJE<b>${fmtT(dayVal(id,f.key,S.date),f.type)}</b></div><div>SEMANA<b>${fmtT(wv.reduce((a,b)=>a+b.v,0),f.type)}</b></div><div>MÊS<b>${fmtT(mes,f.type)}</b></div></div></div>`;
  });

  /* dimensões específicas */
  const dimHTML = dimensions(id,sec,fdFech);

  /* alertas */
  let alertHTML="";
  alerts.forEach(f=>{ const v=(entriesOf(id)[S.date]||{})[f.key]; alertHTML+=`<div class="alert"><b>${f.label}</b>${v?v:"<span style='color:#b9a25e'>— sem registro neste dia —</span>"}</div>`; });

  /* lançamento do dia */
  const lanc = conf.filter(f=>["diario","acum"].includes(f.nat));
  const textAlerts = conf.filter(f=>f.nat==="alerta");
  let inputsHTML = groupedInputs(id, lanc.concat(textAlerts), editable);

  /* nota de leitura */
  let roNote="";
  if(!editable){
    if(reported(id,S.date) && S.date!==st.openISO) roNote=`<div class="ro-note">Em leitura — este dia já foi lançado. Para corrigir hoje, vá ao dia aberto.</div>`;
    else if(st.status==="hard" && !st.released) roNote=`<div class="ro-note">Lançamento travado. O gestor precisa liberar (botão no topo).</div>`;
    else if(S.date!==st.openISO) roNote=`<div class="ro-note">Para lançar, volte ao dia aberto: <b>${brISO(st.openISO)}</b>. <button class="btn-ghost" style="margin-left:8px" onclick="onDate('${st.openISO}')">Ir ao dia aberto</button></div>`;
  }

  /* configuração (enxuta) */
  let cfgHTML = configRows(id);

  return `
  ${janelaBanner()}
  ${lockBanner(id)}
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:flex-end">
      <div><label class="fl">Data do lançamento</label><input type="date" value="${S.date}" min="${monthStartISO()}" max="${st.refISO}" onchange="onDate(this.value)" style="width:auto"></div>
      <div style="display:flex;gap:8px"><button class="btn-ghost" onclick="clearDay('${id}')" ${editable?"":"disabled"}>Limpar dia</button></div>
    </div>
    ${roNote}
  </div>

  <div class="card" style="border-top:4px solid ${sec.color}">
    <h2>📊 ${sec.name} — Medidores do mês</h2>
    <p class="muted">As 2 metas-chave. ★ alimenta o termômetro da Unidade. Verde na meta · amarelo perto · vermelho abaixo.</p>
    <div class="mae-grid" style="margin-top:12px">${gHTML||'<div class="empty">Defina os medidores na configuração.</div>'}</div>
  </div>

  ${id==="cra"?craBlocks(id,sec,fdFech):""}

  ${dHTML?`<div class="card"><h2>🧮 Métricas derivadas <span class="badge">cálculo automático</span></h2><p class="muted">Calculadas a partir do que já é lançado — sem digitar nada novo. Toque no “i” para ver a conta.</p><div class="grid-cards" style="margin-top:12px">${dHTML}</div></div>`:""}

  ${subHTML?`<div class="card"><h2>📈 Submetas</h2><p class="muted">Apoiam os medidores — barras dos últimos 7 dias.</p><div class="grid2" style="margin-top:12px">${subHTML}</div></div>`:""}

  ${dimHTML}

  ${alertHTML?`<div class="card"><h2>🚩 Alertas do dia</h2>${alertHTML}</div>`:""}

  <div class="card">
    <h2>✏️ Lançamento do dia</h2>
    <p class="muted">${editable?`Preencha os números de <b>${brISO(S.date)}</b>. Salva sozinho.`:"Somente leitura — veja a nota acima."}</p>
    ${inputsHTML}
  </div>

  <div class="card">
    <h2>📥 Cadastro (estado atual)</h2>
    <p class="muted">Valores de fundo que não são do dia (não entram na trava). Atualize quando mudarem.</p>
    ${estadoInputs(id,["estado","mensal"])}
  </div>

  ${conf.some(f=>f.nat==="semanal")?`<div class="card"><h2>🗓️ Atualização semanal</h2><p class="muted">Revisado uma vez por semana.</p>${estadoInputs(id,["semanal"])}</div>`:""}

  <div class="card">
    <h2>⚙️ Metas & medidores</h2>
    <p class="muted">Ajuste as metas e troque o ★. Edição enxuta — a estrutura de indicadores é fixa nesta versão.</p>
    ${cfgHTML}
    <button class="btn-ghost" style="margin-top:8px" onclick="resetSector('${id}')">Restaurar padrão do setor</button>
  </div>`;
}

/* ---------- DIMENSÕES (ENF/RAD, turnos, evasão, checklist, saldos) ---------- */
function dimensions(id,sec,fd){
  const conf=confOf(id); let out="";
  const has=(k)=>conf.some(f=>f.key===k);
  // ENF/RAD
  if(has("alenf")&&has("alrad")){
    const items=[{lab:"ENF",val:resolveKey(id,"alenf",fd)},{lab:"RAD",val:resolveKey(id,"alrad",fd)}];
    const sc=[];
    if(has("ocupenf")) sc.push(scoreCard(fmt(resolveKey(id,"ocupenf",fd))+"%","Ocupação ENF",iBtn(iDeriv(id,fieldOf(id,"ocupenf"),fd))));
    if(has("ocuprad")) sc.push(scoreCard(fmt(resolveKey(id,"ocuprad",fd))+"%","Ocupação RAD",iBtn(iDeriv(id,fieldOf(id,"ocuprad"),fd))));
    if(has("alprenf"))sc.push(scoreCard(fmt(resolveKey(id,"alprenf",fd)),"Alunos/precep. ENF",iBtn(iDeriv(id,fieldOf(id,"alprenf"),fd))));
    if(has("alprrad"))sc.push(scoreCard(fmt(resolveKey(id,"alprrad",fd)),"Alunos/precep. RAD",iBtn(iDeriv(id,fieldOf(id,"alprrad"),fd))));
    out+=`<div class="card"><h2>🩺 Segmentação ENF × RAD</h2><p class="muted">Alunos por eixo e indicadores de ocupação e preceptoria.</p>${compareBars(items,sec.color)}<div class="grid-cards" style="margin-top:12px">${sc.join("")}</div></div>`;
  }
  // turmas por turno
  if(has("tnoite")&&has("tmanha")&&has("ttarde")){
    const items=[{lab:"Manhã",val:resolveKey(id,"tmanha",fd)},{lab:"Tarde",val:resolveKey(id,"ttarde",fd)},{lab:"Noite",val:resolveKey(id,"tnoite",fd)}];
    const extra = has("tottur")? scoreCard(fmt(resolveKey(id,"tottur",fd)),"Turmas totais",iBtn(iDeriv(id,fieldOf(id,"tottur"),fd))) : "";
    out+=`<div class="card"><h2>🏫 Turmas por turno</h2>${compareBars(items,sec.color)}${extra?`<div class="grid-cards" style="margin-top:12px">${extra}</div>`:""}</div>`;
  }
  // evasão por turno
  if(has("evnoite")&&has("evmanha")&&has("evtarde")){
    const items=[{lab:"Manhã",val:resolveKey(id,"evmanha",fd)},{lab:"Tarde",val:resolveKey(id,"evtarde",fd)},{lab:"Noite",val:resolveKey(id,"evnoite",fd)}];
    out+=`<div class="card"><h2>📉 Evasão por turno (mês)</h2><p class="muted">Soma de evasões do mês por turno — quanto menor, melhor.</p>${compareBars(items,"#c0392b")}</div>`;
  }
  // checklist Secretaria
  if(has("livItau")){
    const livs=["livItau","livCaixa","livPag","livCx"], cons=["conItau","conCaixa","conPag","conCx"];
    const cl = livs.map(k=>chip(lbl(id,k).replace("Livro despesa — ",""),dayVal(id,k,fd))).join("");
    const cc = cons.map(k=>chip(lbl(id,k).replace("Conciliação — ",""),dayVal(id,k,fd))).join("");
    const dreC = chip("DRE",dayVal(id,"dre",fd));
    const sc=[];
    if(has("pctliv"))sc.push(scoreCard(fmt(resolveKey(id,"pctliv",fd))+"%","Livros lançados",iBtn(iDeriv(id,fieldOf(id,"pctliv"),fd))));
    if(has("pctcon"))sc.push(scoreCard(fmt(resolveKey(id,"pctcon",fd))+"%","Conciliações",iBtn(iDeriv(id,fieldOf(id,"pctcon"),fd))));
    out+=`<div class="card"><h2>🧾 Fechamento de ${brISO(fd)}</h2><p class="muted">Status dos livros, conciliações e DRE deste dia.</p><div class="ghead">Livros de despesa</div><div class="chk">${cl}</div><div class="ghead">Conciliações</div><div class="chk">${cc}</div><div class="ghead">DRE</div><div class="chk">${dreC}</div><div class="grid-cards" style="margin-top:12px">${sc.join("")}</div></div>`;
  }
  // saldos por conta
  if(has("saldoItau")){
    const ks=["saldoItau","saldoCaixa","saldoPag","saldoCx"];
    const sc=ks.map(k=>scoreCard(fmtT(dayVal(id,k,fd),"money"),lbl(id,k).replace(" (dia)",""),"")).join("");
    const tot = has("saldotot")? scoreCard(fmtT(resolveKey(id,"saldotot",fd),"money"),"Saldo total do dia",iBtn(iDeriv(id,fieldOf(id,"saldotot"),fd))) : "";
    out+=`<div class="card"><h2>💰 Saldos do dia (${brISO(fd)})</h2><p class="muted">Foto do saldo de cada conta neste dia — não soma no mês.</p><div class="grid-cards">${sc}${tot}</div></div>`;
  }
  return out;
}

/* ---------- inputs agrupados (lançamento) ---------- */
function groupedInputs(id, fields, editable){
  const day=entriesOf(id)[S.date]||{};
  const groups={}; const order=[];
  fields.forEach(f=>{ const g=f.grupo||"Indicadores do dia"; if(!groups[g]){groups[g]=[];order.push(g);} groups[g].push(f); });
  let html="";
  order.forEach(g=>{
    html+=`<div class="grid2" style="margin-top:6px"><div class="ghead">${g}</div>`;
    groups[g].forEach(f=>{
      const v=day[f.key];
      if(f.type==="bool"){
        const on=v===true; const dis=!editable;
        html+=`<div>${`<div class="toggle ${on?'on':'off'}" ${dis?'aria-disabled="true"':''} onclick="${dis?'':`toggleBool('${id}','${f.key}')`}"><span class="box">${on?'✓':''}</span><span>${f.label}</span></div>`}</div>`;
      } else if(f.type==="text"){
        html+=`<div><label class="fl">${f.label}</label><input data-k="${f.key}" value="${String(v==null?"":v).replace(/"/g,'&quot;')}" oninput="onEntry(this)" onchange="render()" placeholder="Escreva aqui…" ${editable?"":"disabled"}></div>`;
      } else {
        const unit=f.type==="money"?"R$":f.type==="pct"?"%":""; const sn=f.snap?` <span class="badge">do dia</span>`:"";
        html+=`<div><label class="fl">${f.label} ${unit?`<span style="color:#9aa7a0">(${unit})</span>`:""}${sn}</label><input data-k="${f.key}" type="number" inputmode="decimal" step="any" value="${v==null?"":v}" oninput="onEntry(this)" onchange="render()" placeholder="0" ${editable?"":"disabled"}></div>`;
      }
    });
    html+=`</div>`;
  });
  return html;
}

/* ---------- inputs de estado/mensal/semanal ---------- */
function estadoInputs(id,nats){
  const conf=confOf(id).filter(f=>nats.includes(f.nat)); if(!conf.length) return '<div class="empty">Nada a cadastrar.</div>';
  const est=estadoOf(id);
  const inp=(f)=>{
    const v=est[f.key];
    const flag=f.flag?` <span class="badge" title="${f.flag}">⚑ fonte</span>`:"";
    if(f.type==="bool"){ const on=v===true; return `<div><div class="toggle ${on?'on':'off'}" onclick="toggleEstado('${id}','${f.key}')"><span class="box">${on?'✓':''}</span><span>${f.label}${flag}</span></div></div>`; }
    const unit=f.type==="money"?"R$":f.type==="pct"?"%":""; return `<div><label class="fl">${f.label} ${unit?`<span style="color:#9aa7a0">(${unit})</span>`:""}${flag}</label><input type="${f.type==="text"?"text":"number"}" step="any" value="${v==null?"":String(v).replace(/"/g,'&quot;')}" onchange="onEstado('${id}','${f.key}',this.value)" placeholder="${f.type==="text"?"":"0"}"></div>`;
  };
  if(conf.some(f=>f.grupo)){
    const groups={}, order=[];
    conf.forEach(f=>{ const g=f.grupo||"Outros cadastros"; if(!groups[g]){groups[g]=[];order.push(g);} groups[g].push(f); });
    let html="";
    order.forEach(g=>{ html+=`<div class="grid2" style="margin-top:6px"><div class="ghead">${g}</div>${groups[g].map(inp).join("")}</div>`; });
    return html;
  }
  return '<div class="grid2" style="margin-top:6px">'+conf.map(inp).join("")+'</div>';
}

/* ---------- config enxuta ---------- */
function configRows(id){
  const conf=confOf(id); let html="";
  conf.filter(f=>f.g).sort((a,b)=>a.g-b.g).forEach(f=>{
    html+=`<div class="cfg">
      <button class="mae" title="Definir como ★ (alimenta a Unidade)" onclick="setStar('${id}','${f.key}')">${f.g===1?"★":"☆"}</button>
      <input class="nm" value="${String(f.label).replace(/"/g,'&quot;')}" disabled>
      <span class="tag">${f.g===1?"★ MEDIDOR":"MEDIDOR"}</span>
      <input class="mt" type="number" step="any" title="Meta do mês" value="${f.meta==null?"":f.meta}" onchange="onMeta('${id}','${f.key}',this.value)">
    </div>`;
  });
  // metas de submetas acumuladas relevantes (ex.: recvalor, pagrec já é medidor)
  conf.filter(f=>!f.g && f.meta!=null && ["diario","acum"].includes(f.nat)).forEach(f=>{
    html+=`<div class="cfg"><span class="mae" style="opacity:.4">•</span><input class="nm" value="${String(f.label).replace(/"/g,'&quot;')}" disabled><span class="tag">SUBMETA</span><input class="mt" type="number" step="any" value="${f.meta}" onchange="onMeta('${id}','${f.key}',this.value)"></div>`;
  });
  return html;
}

/* ---------- UNIT VIEW ---------- */
function ymNow(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function ymLabel(ym){ const p=(ym||"").split("-"); const ms=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"]; return p.length===2?`${ms[(+p[1])-1]||p[1]}/${p[0]}`:ym; }
function snapshotMonth(){
  const ym=ymNow(), t=isoToday();
  S.data.historico[ym]={
    atInicio:unidadeNum("atInicio"), atConcluidos:unidadeNum("atConcluidos"),
    cartVal:resolveKey("cra","cartVal",t), recvalor:resolveKey("cra","recvalor",t),
    perdaVal:resolveKey("cra","perdaVal",t), pctreceb:resolveKey("cra","pctreceb",t),
    pctperda:resolveKey("cra","pctperda",t), ts:Date.now()
  };
  save(); render();
}
function unitInputsCard(){
  const ai=unidadeNum("atInicio"), ac=unidadeNum("atConcluidos");
  const iH=`<b>Dados da central</b><br>Base de alunos ativos da unidade no mês. Alimenta os tickets por aluno do CRA (Ticket por aluno ativo e Parcelas sobre ativos).<span class="f">início: ${fmt(ai)} · concluíram: ${fmt(ac)}</span>`;
  return `<div class="card"><h2>🏢 Dados da central (mês) ${iBtn(iH)}</h2>
    <p class="muted">Número de alunos ativos da unidade. Sem isto, os tickets por aluno do CRA aparecem como “–”.</p>
    <div class="grid2" style="margin-top:6px">
      <div><label class="fl">${uLbl("atInicio")}</label><input type="number" step="any" value="${(S.data.unidade.atInicio==null||S.data.unidade.atInicio==="")?"":S.data.unidade.atInicio}" onchange="onUnidade('atInicio',this.value)" placeholder="0"></div>
      <div><label class="fl">${uLbl("atConcluidos")}</label><input type="number" step="any" value="${(S.data.unidade.atConcluidos==null||S.data.unidade.atConcluidos==="")?"":S.data.unidade.atConcluidos}" onchange="onUnidade('atConcluidos',this.value)" placeholder="0"></div>
    </div></div>`;
}
function historyTable(){
  const h=S.data.historico||{}; const yms=Object.keys(h).sort().reverse();
  const iH=`<b>Histórico mensal</b><br>Foto manual dos números-chave do CRA no momento em que você toca “Fotografar mês”. Serve para comparar meses — não recalcula sozinho.<span class="f">guarda: ativos início/concluídos, carteira, recebido, perda, % recebido e % perdido</span>`;
  let rows="";
  if(!yms.length){ rows=`<div class="empty">Nenhuma foto ainda. Toque em “Fotografar mês” para guardar os números atuais.</div>`; }
  else{
    rows=`<div style="overflow-x:auto"><table class="htab"><thead><tr><th>Mês</th><th>Ativos início</th><th>Concluíram</th><th>Carteira</th><th>Recebido</th><th>Perda</th><th>% receb.</th><th>% perda</th></tr></thead><tbody>`;
    yms.forEach(ym=>{ const r=h[ym]; rows+=`<tr><td><b>${ymLabel(ym)}</b></td><td>${fmt(r.atInicio)}</td><td>${fmt(r.atConcluidos)}</td><td>${fmtT(r.cartVal,'money')}</td><td>${fmtT(r.recvalor,'money')}</td><td>${fmtT(r.perdaVal,'money')}</td><td>${fmt(r.pctreceb)}%</td><td>${fmt(r.pctperda)}%</td></tr>`; });
    rows+=`</tbody></table></div>`;
  }
  return `<div class="card"><h2>🗓️ Histórico mensal ${iBtn(iH)}</h2>
    <p class="muted">Comparativo mês a mês dos números do CRA. A foto de <b>${ymLabel(ymNow())}</b> sobrescreve se você fotografar de novo no mesmo mês.</p>
    <button class="btn-ghost" onclick="snapshotMonth()">📸 Fotografar mês (${ymLabel(ymNow())})</button>
    <div style="margin-top:12px">${rows}</div></div>`;
}
function unitView(){
  const rows=DEFAULTS.map(s=>({s, star:sectorStar(s.id), health:sectorHealth(s.id)}));
  const overall=Math.round(rows.reduce((a,b)=>a+b.star,0)/rows.length);
  const ocol=colorFor(overall);

  // ranking pela ★ (mesma métrica do termômetro)
  const ranked=[...rows].sort((a,b)=>b.star-a.star);
  let rankHTML="";
  ranked.forEach(({s,star})=>{ const pc=Math.round(star); rankHTML+=`<div class="rank"><div class="nm" style="color:${s.color}">${s.name}</div><div class="bar"><div class="fill" style="width:${Math.min(100,pc)}%;background:${colorFor(star)}"></div></div><div class="pc" style="color:${colorFor(star)}">${pc}%</div></div>`; });

  // cards por setor (★ + 2º medidor)
  let cardsHTML="";
  rows.forEach(({s})=>{
    const conf=confOf(s.id); const ref=refBizDate();
    const g1=conf.find(f=>f.g===1), g2=conf.find(f=>f.g===2);
    const main=g1?gaugeScore(s.id,g1):null;
    const spark = (g1&&g1.nat==="acum")? sparkSVG(monthSeries(s.id,g1.key,ref).slice(0,ref.getDate()).map(v=>v||0), s.color) : "";
    const therm = main? `<div class="therm" style="background:${colorFor(main.pc)}22;color:${colorFor(main.pc)};margin-top:8px">● ${thermLabel(main.pc, g1.nat==="acum"?"proj":"inst")}</div>`:"";
    const line=(f)=>{ if(!f)return ""; const sc=gaugeScore(s.id,f); const val = sc.mode==="proj"?sc.acc:sc.val; return `<div style="font-size:11px;color:var(--cinza);margin-top:4px">${f.g===1?"★ ":""}${f.label}: <b style="color:${s.color}">${fmtT(val,f.type)}</b> / ${fmtT(f.meta,f.type)} · ${Math.round(sc.pc)}%</div>`; };
    cardsHTML+=`<div class="sub-card" style="border-top:4px solid ${s.color};cursor:pointer" onclick="go('${s.id}')"><div class="sub-name" style="color:${s.color}">${s.name}</div>${spark}${line(g1)}${line(g2)}${therm}</div>`;
  });

  // auditoria de lançamentos
  let auditHTML="";
  DEFAULTS.forEach(s=>{ const st=lockStatus(s.id);
    let cl,tx;
    if(st.status==="ok"||st.status==="open"){ cl="yes"; tx=st.status==="ok"?"em dia":"falta hoje"; }
    else if(st.status==="warn"){ cl="no"; tx=`atraso 1 dia`; }
    else if(st.status==="bad"){ cl="no"; tx=`atraso ${st.gap} dias`; }
    else { cl="no"; tx=st.released?`travado (liberado)`:`TRAVADO ${st.gap}d`; }
    const miss=st.missing.filter(x=>x<st.refISO).map(brISO);
    auditHTML+=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px;padding:8px 0;border-top:1px solid var(--linha)">
      <div style="width:110px;font-weight:700;color:${s.color}">${s.name}</div>
      <span class="chip ${cl}">${cl==="yes"?"✓":"✗"} ${tx}</span>
      <div style="font-size:12px;color:var(--cinza);flex:1">${miss.length?("Dias em falta: "+miss.join(", ")):"sem buracos no mês"}</div>
    </div>`;
  });

  return `
  ${janelaBanner()}
  <div class="card" style="text-align:center;border-top:4px solid #0d4420">
    <h2 style="justify-content:center">🌡️ Termômetro da Unidade ${iBtn("<b>Índice da unidade</b><br>Média da projeção do indicador ★ de cada setor (não o % de hoje).<span class=\"f\">unidade = média( score ★ projetado de cada setor )\nverde ≥100% · amarelo 80–99% · vermelho <80%</span>")}</h2>
    ${gaugeSVG(Math.min(100,overall),ocol)}
    <div class="gauge-big" style="color:${ocol}">${overall}%</div>
    <div class="gauge-sub">projeção média do indicador ★ dos 5 setores</div>
    <div class="legend" style="justify-content:center">
      <span><span class="dot" style="background:var(--ok)"></span>Na meta</span>
      <span><span class="dot" style="background:var(--warn)"></span>Perto (80–99%)</span>
      <span><span class="dot" style="background:var(--bad)"></span>Abaixo (&lt;80%)</span>
    </div>
  </div>

  <div class="card"><h2>🏁 Ranking dos setores</h2><p class="muted">Pelo indicador ★ (tendência projetada para o mês).</p>${rankHTML}</div>

  <div class="card"><h2>🧭 Auditoria de lançamentos <span class="badge">quem alimentou</span></h2><p class="muted">Status de cada setor pela regra de dias úteis. Buracos continuam marcados mesmo após liberação.</p>${auditHTML}</div>

  <div class="card"><h2>📋 Visão por setor</h2><p class="muted">Toque num card para abrir o setor.</p><div class="grid-cards" style="margin-top:12px">${cardsHTML}</div></div>

  ${unitInputsCard()}

  ${historyTable()}

  <div class="card" style="border-top:4px solid #8f1414">
    <h2>🔒 Configuração da trava (gestor)</h2>
    <p class="muted">Limiares de atraso (em dias úteis), feriados e PIN. Vale como ajuste local nesta versão.</p>
    <div class="grid3" style="margin-top:10px">
      <div><label class="fl">Amarelo a partir de</label><input type="number" min="1" step="1" value="${S.data.cfg.thresholds.warn}" onchange="setThreshold('warn',this.value)"></div>
      <div><label class="fl">Vermelho a partir de</label><input type="number" min="1" step="1" value="${S.data.cfg.thresholds.bad}" onchange="setThreshold('bad',this.value)"></div>
      <div><label class="fl">Trava dura a partir de</label><input type="number" min="1" step="1" value="${S.data.cfg.thresholds.hard}" onchange="setThreshold('hard',this.value)"></div>
    </div>
    <div style="margin-top:10px"><label class="fl">Início da contagem da trava (a partir desta data)</label><input type="date" value="${S.data.cfg.inicio||""}" onchange="setInicio(this.value)"></div>
    <div style="margin-top:10px"><label class="fl">Dia do vencimento / corte da Janela (1–28)</label><input type="number" min="1" max="28" step="1" value="${dueDay()}" onchange="setDiaVenc(this.value)"></div>
    <div style="margin-top:10px"><label class="fl">Feriados (datas AAAA-MM-DD separadas por vírgula)</label><input type="text" value="${(S.data.cfg.feriados||[]).join(', ')}" onchange="setFeriados(this.value)" placeholder="2026-09-07, 2026-10-12"></div>
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="setPin()">${S.data.cfg.gestorPin?"Alterar PIN do gestor":"Definir PIN do gestor"}</button>
      <span class="muted" style="align-self:center">${S.data.cfg.gestorPin?"PIN definido.":"Sem PIN — será pedido na 1ª liberação."}</span>
    </div>
    <div class="ro-note" style="margin-top:12px">Honestidade: nesta Fase 1 a trava é um <b>controle local por aparelho</b>, não segurança real. “Só o gestor libera” entre dispositivos exige login + regras na nuvem (Fase 2).</div>
  </div>`;
}

/* ====================== EVENTS ====================== */
function onDate(v){ const min=monthStartISO(), max=lockStatus(S.tab).refISO; if(v<min)v=min; if(v>max)v=max; S.date=v||isoToday(); render(); }
function onEntry(el){ const k=el.dataset.k, v=el.value, id=S.tab; const e=entriesOf(id); const day=Object.assign({},e[S.date]||{}); if(v===""||v==null) delete day[k]; else day[k]=v; e[S.date]=day; save(); }
function toggleBool(id,key){ const e=entriesOf(id); const day=Object.assign({},e[S.date]||{}); day[key]=!(day[key]===true); if(day[key]===false) delete day[key]; e[S.date]=day; save(); render(); }
function toggleEstado(id,key){ const est=estadoOf(id); est[key]=!(est[key]===true); if(est[key]===false) delete est[key]; save(); render(); }
function onEstado(id,key,val){ const est=estadoOf(id); const f=fieldOf(id,key); if(val===""||val==null){ delete est[key]; } else { est[key]= f&&f.type==="text"? val : num(val); } save(); render(); }
function onMeta(id,key,val){ const f=fieldOf(id,key); if(!f)return; f.meta = val===""?0:num(val); save(); render(); }
function setStar(id,key){ const conf=confOf(id); const cur1=conf.find(f=>f.g===1); const tgt=conf.find(f=>f.key===key); if(!tgt||tgt.g===1)return; if(cur1)cur1.g=2; tgt.g=1; save(); render(); }
function clearDay(id){ if(!canEdit(id,S.date))return; const e=entriesOf(id); delete e[S.date]; save(); render(); }
function resetSector(id){ if(!confirm("Restaurar os indicadores padrão deste setor? Lançamentos e estado são mantidos.")) return; S.data.conf[id]=clone(sector(id).fields); save(); render(); }
function releaseLock(id){
  const st=lockStatus(id);
  if(st.status!=="hard"){ alert("A trava dura só aparece com atraso igual ou maior que o limite. Não há o que liberar agora."); return; }
  if(!S.data.cfg.gestorPin){ const np=prompt("Defina um PIN de gestor (mín. 4 dígitos). Só você deve saber:"); if(!np||np.length<4){ alert("PIN não definido."); return; } S.data.cfg.gestorPin=np; }
  const got=prompt("PIN do gestor para liberar o lançamento deste setor:"); if(got==null)return;
  if(got!==S.data.cfg.gestorPin){ alert("PIN incorreto."); return; }
  if(!S.data.lock[id])S.data.lock[id]={}; S.data.lock[id].released=true; save(); render();
}
function setThreshold(which,val){ const n=Math.max(1,Math.round(num(val))); S.data.cfg.thresholds[which]=n; save(); render(); }
function setFeriados(val){ const arr=String(val).split(",").map(s=>s.trim()).filter(s=>/^\d{4}-\d{2}-\d{2}$/.test(s)); S.data.cfg.feriados=arr; save(); render(); }
function setInicio(val){ if(/^\d{4}-\d{2}-\d{2}$/.test(val)){ S.data.cfg.inicio=val; save(); render(); } }
function onUnidade(key,val){ if(!S.data.unidade)S.data.unidade={}; if(val===""||val==null){ delete S.data.unidade[key]; } else { S.data.unidade[key]=num(val); } save(); render(); }
function setDiaVenc(val){ const n=Math.min(28,Math.max(1,Math.round(num(val))||8)); S.data.cfg.diaVenc=n; save(); render(); }
function setPin(){ const np=prompt("Novo PIN do gestor (mín. 4 dígitos):"); if(np==null)return; if(np.length<4){ alert("PIN muito curto."); return; } if(S.data.cfg.gestorPin){ const old=prompt("Confirme o PIN atual:"); if(old!==S.data.cfg.gestorPin){ alert("PIN atual incorreto."); return; } } S.data.cfg.gestorPin=np; save(); alert("PIN atualizado."); }

/* ====================== BOOT ====================== */
bootData();
S.date=lockStatus("comercial").openISO;
render();
initCloud(0);
</script>
</body>
</html>
