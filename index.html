document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ef1ea; font-family: 'Plus Jakarta Sans', sans-serif; }\n  input, select, button { font-family: inherit; }\n  input:focus, select:focus { outline: 2px solid #4ecd1e; outline-offset: 1px; }\n<\u002Fstyle>\n<script src=\"d9fbc3e3-9788-4f49-be96-d6853ba6cd42\"><\u002Fscript>\n<script src=\"75559c49-9266-40f4-a98e-469257c1d1b0\"><\u002Fscript>\n<\u002Fhelmet>\n\n<sc-if value=\"{{ ready }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"max-width:940px; margin:0 auto; padding:0 0 60px 0; color:#16261c;\">\n\n  <!-- HEADER -->\n  <div style=\"background:#0d4420; padding:22px 28px; display:flex; align-items:center; justify-content:space-between; position:relative; overflow:hidden;\">\n    <div style=\"position:absolute; top:-120px; right:-80px; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle,#1d7a12 0%,rgba(29,122,18,0) 70%);\"><\u002Fdiv>\n    <div style=\"position:relative; display:flex; align-items:center; gap:18px;\">\n      <img src=\"39983197-a4a0-4beb-8eaa-53a7c10ff7c6\" alt=\"Grau Técnico\" style=\"height:40px; width:auto;\">\n      <div style=\"width:2px; height:46px; background:rgba(255,255,255,.3);\"><\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px; font-weight:700; letter-spacing:3px; color:#9fe27a;\">PAINEL DIÁRIO INTERATIVO<\u002Fdiv>\n        <div style=\"font-size:22px; font-weight:800; color:#ffffff; line-height:1.1;\">Controle de KPI por Setor<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative; text-align:right;\">\n      <div style=\"font-size:11px; font-weight:700; letter-spacing:1px; color:#c6dcc9;\">UNIDADE<\u002Fdiv>\n      <div style=\"font-size:14px; font-weight:800; color:#fff;\">FEIRA DE SANTANA / BA<\u002Fdiv>\n      <div style=\"display:inline-flex; align-items:center; gap:6px; margin-top:7px; font-size:11px; font-weight:700; color:{{ cloud.color }};\"><span style=\"width:8px; height:8px; border-radius:50%; background:{{ cloud.color }};\"><\u002Fspan>{{ cloud.text }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- TABS -->\n  <div style=\"background:#fff; padding:14px 20px; display:flex; gap:10px; flex-wrap:wrap; border-bottom:1px solid #e6e9e2;\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"5\">\n      <button data-sid=\"{{ t.id }}\" onclick=\"{{ switchSector }}\" style=\"border:none; cursor:pointer; font-weight:700; font-size:15px; padding:10px 18px; border-radius:999px; color:{{ t.tint }}; background:{{ t.bg }}; box-shadow:{{ t.shadow }};\">{{ t.name }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"padding:22px 20px 0 20px;\">\n\n    <!-- CONFIGURAÇÃO -->\n    <div style=\"background:#fff; border:1.5px solid #cfe0c6; border-radius:18px; padding:20px 22px; margin-bottom:20px;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <span style=\"font-size:18px;\">⚙️<\u002Fspan>\n        <div style=\"font-size:13px; font-weight:800; letter-spacing:2px; color:{{ sector.color }};\">CONFIGURAR INDICADORES &amp; METAS<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:13px; color:#7c8a83; margin:4px 0 16px 0;\">Escolha o que lançar: renomeie, defina tipo, meta/dia e marque ★ o indicador-chave (alimenta o medidor). A meta do mês é editável.<\u002Fdiv>\n\n      <div style=\"display:flex; align-items:center; gap:12px; background:#0d4420; border-radius:12px; padding:12px 16px; margin-bottom:16px;\">\n        <span style=\"font-size:18px;\">🎯<\u002Fspan>\n        <div style=\"flex:1; font-size:15px; font-weight:700; color:#eaf3ec;\">Meta do mês — {{ sector.name }}<\u002Fdiv>\n        <input type=\"number\" inputmode=\"decimal\" value=\"{{ monthlyMeta }}\" oninput=\"{{ onMonthlyMeta }}\" style=\"width:128px; text-align:center; font-size:18px; font-weight:800; color:#0d4420; padding:9px; border:none; border-radius:9px; background:#b2e639;\">\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <sc-for list=\"{{ configRows }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex; align-items:center; gap:10px; border:1px solid #e6e9e2; border-radius:12px; padding:10px 12px; background:{{ c.rowBg }};\">\n            <button onclick=\"{{ setPrincipal }}\" data-key=\"{{ c.key }}\" title=\"Indicador-chave do medidor\" style=\"border:none; cursor:pointer; background:transparent; font-size:20px; line-height:1; color:{{ c.starColor }}; padding:0 2px;\">{{ c.star }}<\u002Fbutton>\n            <input type=\"text\" value=\"{{ c.label }}\" data-key=\"{{ c.key }}\" oninput=\"{{ onLabel }}\" placeholder=\"Nome do indicador\" style=\"flex:1; min-width:0; font-size:15px; font-weight:700; color:#16261c; padding:9px 11px; border:1.5px solid #e2e6dd; border-radius:9px; background:#fbfdf9;\">\n            <select value=\"{{ c.type }}\" data-key=\"{{ c.key }}\" onchange=\"{{ onType }}\" style=\"font-size:14px; font-weight:700; color:#41504a; padding:9px 8px; border:1.5px solid #e2e6dd; border-radius:9px; background:#fff; cursor:pointer;\">\n              <option value=\"num\">Número<\u002Foption>\n              <option value=\"money\">R$<\u002Foption>\n              <option value=\"pct\">%<\u002Foption>\n              <option value=\"text\">Texto<\u002Foption>\n            <\u002Fselect>\n            <div style=\"text-align:center; width:84px;\">\n              <div style=\"font-size:10px; font-weight:700; letter-spacing:1px; color:#9aa39c;\">{{ c.metaLabel }}<\u002Fdiv>\n              <input type=\"number\" inputmode=\"decimal\" value=\"{{ c.meta }}\" data-key=\"{{ c.key }}\" oninput=\"{{ onFieldMeta }}\" disabled=\"{{ c.metaDisabled }}\" style=\"width:84px; text-align:center; font-size:16px; font-weight:800; color:{{ c.metaColor }}; padding:7px; border:1.5px solid #e2e6dd; border-radius:9px; background:{{ c.metaBg }};\">\n            <\u002Fdiv>\n            <button onclick=\"{{ removeField }}\" data-key=\"{{ c.key }}\" title=\"Remover indicador\" style=\"border:none; cursor:pointer; background:#fbeae4; color:#b3431a; width:34px; height:34px; border-radius:9px; font-size:16px; font-weight:800;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ addField }}\" style=\"margin-top:14px; width:100%; border:1.5px dashed {{ sector.color }}; background:{{ sector.accent }}; color:{{ sector.color }}; font-weight:800; font-size:15px; padding:12px; border-radius:12px; cursor:pointer;\">+ Adicionar indicador<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- TREND BANNER -->\n    <div style=\"display:flex; align-items:center; gap:16px; background:{{ trend.bg }}; border-radius:16px; padding:18px 22px; margin-bottom:20px;\">\n      <div style=\"font-size:34px; line-height:1; color:{{ trend.color }};\">{{ trend.arrow }}<\u002Fdiv>\n      <div style=\"flex:1;\">\n        <div style=\"font-size:18px; font-weight:800; color:{{ trend.color }};\">{{ trend.label }}<\u002Fdiv>\n        <div style=\"font-size:14px; color:#5c6862; margin-top:2px;\">Esta semana: <strong>{{ trend.cur }}<\u002Fstrong> · Semana passada: <strong>{{ trend.prev }}<\u002Fstrong> — {{ principalLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- GRID -->\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;\">\n\n      <!-- LANÇAMENTO -->\n      <div style=\"background:#fff; border:1px solid #e6e9e2; border-radius:18px; padding:22px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\">\n          <div style=\"font-size:13px; font-weight:800; letter-spacing:2px; color:{{ sector.color }};\">LANÇAMENTO DO DIA<\u002Fdiv>\n          <div style=\"font-size:12px; font-weight:700; color:#3f9e34; background:#eef5e9; padding:5px 11px; border-radius:999px;\">✓ salvo automaticamente<\u002Fdiv>\n        <\u002Fdiv>\n        <label style=\"display:block; font-size:13px; color:#7c8a83; font-weight:600; margin:10px 0 5px 0;\">Data do lançamento<\u002Flabel>\n        <input type=\"date\" value=\"{{ dateValue }}\" oninput=\"{{ onDate }}\" style=\"width:100%; font-size:16px; font-weight:700; color:#0d4420; padding:11px 14px; border:1.5px solid #d8ddd4; border-radius:11px;\">\n\n        <div style=\"display:flex; flex-direction:column; gap:12px; margin-top:18px;\">\n          <sc-for list=\"{{ entryNums }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; align-items:center; gap:14px;\">\n              <div style=\"flex:1;\">\n                <input type=\"text\" value=\"{{ f.label }}\" data-key=\"{{ f.key }}\" oninput=\"{{ onLabel }}\" style=\"width:100%; font-size:15px; font-weight:700; color:#16261c; border:none; border-bottom:1.5px dashed #dfe3da; padding:3px 0; background:transparent;\">\n                <div style=\"font-size:12px; color:#9aa39c; margin-top:3px;\">{{ f.metaText }}<\u002Fdiv>\n              <\u002Fdiv>\n              <input type=\"number\" inputmode=\"decimal\" value=\"{{ f.value }}\" data-key=\"{{ f.key }}\" oninput=\"{{ onField }}\" placeholder=\"0\" style=\"width:104px; text-align:center; font-size:20px; font-weight:800; color:#0d4420; padding:10px; border:1.5px solid #d8ddd4; border-radius:11px; background:#fbfdf9;\">\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-for list=\"{{ entryTexts }}\" as=\"tf\" hint-placeholder-count=\"1\">\n            <div>\n              <input type=\"text\" value=\"{{ tf.label }}\" data-key=\"{{ tf.key }}\" oninput=\"{{ onLabel }}\" style=\"width:100%; font-size:15px; font-weight:700; color:#16261c; border:none; border-bottom:1.5px dashed #dfe3da; padding:3px 0; margin-bottom:8px; background:transparent;\">\n              <input type=\"text\" value=\"{{ tf.value }}\" data-key=\"{{ tf.key }}\" oninput=\"{{ onField }}\" placeholder=\"Digite aqui…\" style=\"width:100%; font-size:15px; font-weight:600; color:#0d4420; padding:11px 14px; border:1.5px solid #d8ddd4; border-radius:11px;\">\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ clearDay }}\" style=\"margin-top:16px; border:1.5px solid #e2c4bd; background:#fff; color:#b3431a; font-weight:700; font-size:13px; padding:9px 16px; border-radius:10px; cursor:pointer;\">Limpar este dia<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- RESUMO -->\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n        <div style=\"background:#fff; border:1px solid #e6e9e2; border-radius:18px; padding:22px; text-align:center;\">\n          <div style=\"font-size:13px; font-weight:800; letter-spacing:2px; color:{{ sector.color }};\">{{ gauge.title }}<\u002Fdiv>\n          <div style=\"font-size:12px; color:#9aa39c; margin-top:2px;\">acumulado de {{ monthLabel }}<\u002Fdiv>\n          <svg width=\"260\" height=\"158\" viewBox=\"0 0 240 150\" style=\"margin-top:6px;\">\n            <path d=\"M20,120 A100,100 0 0 1 220,120\" fill=\"none\" stroke=\"#e7ece3\" stroke-width=\"22\" stroke-linecap=\"round\"><\u002Fpath>\n            <path d=\"M20,120 A100,100 0 0 1 220,120\" fill=\"none\" stroke=\"{{ gauge.color }}\" stroke-width=\"22\" stroke-linecap=\"round\" stroke-dasharray=\"{{ gauge.dash }}\"><\u002Fpath>\n            <text x=\"120\" y=\"104\" text-anchor=\"middle\" font-family=\"Plus Jakarta Sans\" font-size=\"44\" font-weight=\"800\" fill=\"#0d4420\">{{ gauge.big }}<\u002Ftext>\n            <text x=\"120\" y=\"134\" text-anchor=\"middle\" font-family=\"Plus Jakarta Sans\" font-size=\"15\" font-weight=\"600\" fill=\"#7c8a83\">{{ gauge.sub }}<\u002Ftext>\n          <\u002Fsvg>\n          <div style=\"display:inline-block; font-size:13px; font-weight:800; color:{{ gauge.color }}; background:{{ sector.accent }}; padding:7px 16px; border-radius:999px;\">{{ gauge.pctText }} da meta<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #e6e9e2; border-radius:18px; padding:22px;\">\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n            <div style=\"font-size:13px; font-weight:800; letter-spacing:2px; color:{{ sector.color }};\">ESTA SEMANA<\u002Fdiv>\n            <div style=\"font-size:12px; color:#9aa39c; font-weight:600;\">{{ weekRange }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:6px; margin-top:18px; height:150px;\">\n            <sc-for list=\"{{ weekBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n              <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:7px;\">\n                <div style=\"font-size:12px; font-weight:800; color:#0d4420;\">{{ b.val }}<\u002Fdiv>\n                <div style=\"width:100%; max-width:36px; height:{{ b.h }}px; background:{{ b.color }}; border-radius:7px 7px 3px 3px;\"><\u002Fdiv>\n                <div style=\"font-size:12px; font-weight:600; color:{{ b.dayColor }};\">{{ b.day }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- KPI TILES -->\n    <div style=\"background:#fff; border:1px solid #e6e9e2; border-radius:18px; padding:22px; margin-top:20px;\">\n      <div style=\"font-size:13px; font-weight:800; letter-spacing:2px; color:{{ sector.color }}; margin-bottom:16px;\">ACUMULADO POR INDICADOR<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:14px;\">\n        <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"3\">\n          <div style=\"border:1px solid #ebeee8; border-radius:14px; padding:15px 18px; display:flex; align-items:center; justify-content:space-between;\">\n            <div style=\"font-size:16px; font-weight:700; color:#16261c; max-width:190px;\">{{ k.label }}<\u002Fdiv>\n            <div style=\"display:flex; gap:16px; text-align:center;\">\n              <div><div style=\"font-size:11px; font-weight:700; color:#9aa39c; letter-spacing:1px;\">{{ k.c1 }}<\u002Fdiv><div style=\"font-size:20px; font-weight:800; color:#0d4420;\">{{ k.v1 }}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11px; font-weight:700; color:#9aa39c; letter-spacing:1px;\">{{ k.c2 }}<\u002Fdiv><div style=\"font-size:20px; font-weight:800; color:{{ sector.color }};\">{{ k.v2 }}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11px; font-weight:700; color:#9aa39c; letter-spacing:1px;\">{{ k.c3 }}<\u002Fdiv><div style=\"font-size:20px; font-weight:800; color:#0d4420;\">{{ k.v3 }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; gap:12px; margin-top:18px; flex-wrap:wrap;\">\n      <button onclick=\"{{ resetSector }}\" style=\"border:1.5px solid #d8ddd4; background:#fff; color:#5c6862; font-weight:700; font-size:13px; padding:9px 16px; border-radius:10px; cursor:pointer;\">Restaurar indicadores padrão deste setor<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center; font-size:13px; color:#9aa39c; margin-top:18px; line-height:1.5;\">Os dados ficam salvos neste aparelho/navegador. Cada líder usa no seu celular e envia a foto do painel no grupo às 17h30.<br>v3.0 · Grau Técnico FSA<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  DEFAULTS = [\n    {id:'comercial',name:'Comercial',color:'#2E75B6',accent:'#eef5fb',monthlyMeta:30,\n      fields:[\n        {key:'visitas',label:'Visitas agendadas',meta:5,type:'num',principal:false},\n        {key:'faladas',label:'Faladas (melhor vendedor)',meta:25,type:'num',principal:false},\n        {key:'matriculasGP',label:'Matrículas Grau P',meta:1,type:'num',principal:false},\n        {key:'matriculasGT',label:'Matrículas Grau T',meta:1,type:'num',principal:true},\n        {key:'melhorVendedor',label:'Nome do melhor vendedor do dia',meta:0,type:'text',principal:false}]},\n    {id:'cra',name:'CRA',color:'#E67E22',accent:'#fdf1e7',monthlyMeta:50000,\n      fields:[\n        {key:'ligacoes',label:'Ligações de cobrança',meta:20,type:'num',principal:false},\n        {key:'acordos',label:'Acordos fechados',meta:3,type:'num',principal:false},\n        {key:'recebimento',label:'Recebimento do dia',meta:0,type:'money',principal:true},\n        {key:'critico',label:'Aluno crítico a escalar p/ gestor',meta:0,type:'text',principal:false}]},\n    {id:'pedagogico',name:'Pedagógico',color:'#4f9e34',accent:'#eef5e9',monthlyMeta:85,\n      fields:[\n        {key:'presenca',label:'Presença GT',meta:85,type:'pct',principal:true},\n        {key:'atendimentos',label:'Atendimentos pedagógicos',meta:4,type:'num',principal:false},\n        {key:'encaminhados',label:'Encaminhados a estágio',meta:1,type:'num',principal:false},\n        {key:'evasao',label:'Aluno em alerta de evasão',meta:0,type:'text',principal:false}]},\n    {id:'qualidade',name:'Qualidade',color:'#C99A12',accent:'#faf4df',monthlyMeta:200,\n      fields:[\n        {key:'posvenda',label:'Pós-venda contatados',meta:10,type:'num',principal:true},\n        {key:'cancelados',label:'Cancelamentos',meta:0,type:'num',principal:false},\n        {key:'reversoes',label:'Reversões bem-sucedidas',meta:1,type:'num',principal:false},\n        {key:'nc',label:'NC do PEF identificada hoje',meta:0,type:'text',principal:false}]},\n    {id:'secretaria',name:'Secretaria',color:'#7030A0',accent:'#f3edf8',monthlyMeta:75,\n      fields:[\n        {key:'parcela',label:'1ª parcela recebida',meta:75,type:'pct',principal:true},\n        {key:'nfs',label:'NFs emitidas',meta:5,type:'num',principal:false},\n        {key:'contas',label:'Contas a pagar do dia',meta:0,type:'money',principal:false},\n        {key:'pend',label:'Pendência crítica p/ gestor',meta:0,type:'text',principal:false}]}\n  ];\n\n  FB = { apiKey:\"AIzaSyDywBw1M0yc0xmzfdMnMMRhsxwR-9egzug\", authDomain:\"kpisenviodiariosetores.firebaseapp.com\", projectId:\"kpisenviodiariosetores\", storageBucket:\"kpisenviodiariosetores.firebasestorage.app\", messagingSenderId:\"284852960161\", appId:\"1:284852960161:web:9c0114f35f11609800a9e0\" };\n\n  state = { sectorId:'comercial', date:'', data:{fields:{},meta:{},entries:{}}, ready:false, cloud:'init' };\n\n  componentDidMount(){\n    let data = {fields:{},meta:{},entries:{}};\n    try { const raw = localStorage.getItem('gt_kpi_v3'); if(raw) data = JSON.parse(raw); } catch(e){}\n    if(!data.fields) data.fields={};\n    if(!data.meta) data.meta={};\n    if(!data.entries) data.entries={};\n    this.DEFAULTS.forEach(s=>{\n      if(!data.fields[s.id]) data.fields[s.id] = s.fields.map(f=>({...f}));\n      if(data.meta[s.id]==null) data.meta[s.id] = s.monthlyMeta;\n    });\n    this.setState({ date:this.isoToday(), data, ready:true });\n    this.initCloud(0);\n  }\n\n  initCloud(tries){\n    if(typeof firebase==='undefined' || !firebase.firestore){\n      if(tries<40){ setTimeout(()=>this.initCloud(tries+1), 250); } else { this.setState({cloud:'off'}); }\n      return;\n    }\n    try{\n      if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(this.FB);\n      this.db = firebase.firestore();\n      this.docRef = this.db.collection('paineis').doc('feira-santana');\n      this.setState({cloud:'on'});\n      this.unsub = this.docRef.onSnapshot(snap=>{\n        if(!snap.exists) return;\n        const r = snap.data() || {};\n        if(JSON.stringify(r) === JSON.stringify(this.state.data)) return;\n        const merged = { fields:r.fields||{}, meta:r.meta||{}, entries:r.entries||{} };\n        this.DEFAULTS.forEach(s=>{ if(!merged.fields[s.id]) merged.fields[s.id]=s.fields.map(f=>({...f})); if(merged.meta[s.id]==null) merged.meta[s.id]=s.monthlyMeta; });\n        try{ localStorage.setItem('gt_kpi_v3', JSON.stringify(merged)); }catch(e){}\n        this.setState({data:merged});\n      }, ()=>{ this.setState({cloud:'off'}); });\n    }catch(e){ this.setState({cloud:'off'}); }\n  }\n\n  persist(data){ try{ localStorage.setItem('gt_kpi_v3', JSON.stringify(data)); }catch(e){} this.pushCloud(data); }\n  pushCloud(data){ if(this.docRef){ this.docRef.set(data).catch(()=>this.setState({cloud:'off'})); } }\n  meta(id){ return this.DEFAULTS.find(s=>s.id===(id||this.state.sectorId)); }\n  fieldsOf(id){ return this.state.data.fields[id] || []; }\n  entriesOf(id){ return this.state.data.entries[id] || {}; }\n  genKey(){ return 'f'+Math.random().toString(36).slice(2,8); }\n\n  isoToday(){ return this.iso(new Date()); }\n  iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  parse(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }\n  startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }\n\n  updFields(sid, fn){\n    const data={...this.state.data, fields:{...this.state.data.fields}};\n    const arr=(data.fields[sid]||[]).map(f=>({...f}));\n    const next=fn(arr) || arr;\n    data.fields[sid]=next; this.persist(data); this.setState({data});\n  }\n\n  setField=(e)=>{\n    const k=e.target.dataset.key, v=e.target.value;\n    const sid=this.state.sectorId;\n    const data={...this.state.data, entries:{...this.state.data.entries}};\n    const se={...(data.entries[sid]||{})};\n    const day={...(se[this.state.date]||{})};\n    if(v==='') delete day[k]; else day[k]=v;\n    se[this.state.date]=day; data.entries[sid]=se;\n    this.persist(data); this.setState({data});\n  }\n  onLabel=(e)=>{ const k=e.target.dataset.key, v=e.target.value; this.updFields(this.state.sectorId, arr=>{ const f=arr.find(x=>x.key===k); if(f) f.label=v; }); }\n  onFieldMeta=(e)=>{ const k=e.target.dataset.key, v=e.target.value; this.updFields(this.state.sectorId, arr=>{ const f=arr.find(x=>x.key===k); if(f) f.meta=(v===''?'':Number(v)); }); }\n  onType=(e)=>{ const k=e.target.dataset.key, v=e.target.value; this.updFields(this.state.sectorId, arr=>{ const f=arr.find(x=>x.key===k); if(f){ f.type=v; if(v==='text') f.principal=false; } }); }\n  setPrincipal=(e)=>{ const k=e.currentTarget.dataset.key; this.updFields(this.state.sectorId, arr=>{ const t=arr.find(x=>x.key===k); if(!t||t.type==='text') return; arr.forEach(f=>f.principal=(f.key===k)); }); }\n  addField=()=>{ this.updFields(this.state.sectorId, arr=>{ arr.push({key:this.genKey(),label:'Novo indicador',meta:0,type:'num',principal:false}); }); }\n  removeField=(e)=>{ const k=e.currentTarget.dataset.key; this.updFields(this.state.sectorId, arr=>{ const wasP=(arr.find(x=>x.key===k)||{}).principal; const next=arr.filter(x=>x.key!==k); if(wasP){ const fn=next.find(x=>x.type!=='text'); if(fn) fn.principal=true; } return next; }); }\n  onMonthlyMeta=(e)=>{ const v=e.target.value; const sid=this.state.sectorId; const data={...this.state.data, meta:{...this.state.data.meta}}; data.meta[sid]=(v===''?'':Number(v)); this.persist(data); this.setState({data}); }\n  setDate=(e)=>{ this.setState({date:e.target.value}); }\n  switchSector=(e)=>{ this.setState({sectorId:e.currentTarget.dataset.sid}); }\n  clearDay=()=>{ const sid=this.state.sectorId; const data={...this.state.data, entries:{...this.state.data.entries}}; const se={...(data.entries[sid]||{})}; delete se[this.state.date]; data.entries[sid]=se; this.persist(data); this.setState({data}); }\n  resetSector=()=>{ const sid=this.state.sectorId; const def=this.meta(sid); const data={...this.state.data, fields:{...this.state.data.fields}, meta:{...this.state.data.meta}}; data.fields[sid]=def.fields.map(f=>({...f})); data.meta[sid]=def.monthlyMeta; this.persist(data); this.setState({data}); }\n\n  sumKey(id,key,pred){ const e=this.entriesOf(id); let t=0; for(const iso in e){ if(pred(this.parse(iso))) t+=Number(e[iso][key]||0); } return t; }\n  avgKey(id,key,pred){ const e=this.entriesOf(id); let t=0,n=0; for(const iso in e){ const val=e[iso][key]; if(val==null||val==='') continue; if(pred(this.parse(iso))){ t+=Number(val); n++; } } return n? t/n : 0; }\n  latestKey(id,key,onOrBefore){ const e=this.entriesOf(id); let best=null,bd=null; for(const iso in e){ const val=e[iso][key]; if(val==null||val==='') continue; const d=this.parse(iso); if(onOrBefore && d>onOrBefore) continue; if(!bd||d>bd){bd=d;best=Number(val);} } return best; }\n\n  fmt(v){ if(v==null||v==='') return '–'; const n=Number(v); if(isNaN(n)) return v; return (Math.round(n*100)/100).toLocaleString('pt-BR'); }\n  fmtT(v,type){ if(v==null||v==='') return '–'; if(type==='money') return 'R$ '+this.fmt(v); if(type==='pct') return this.fmt(v)+'%'; return this.fmt(v); }\n  dm(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }\n\n  renderVals(){\n    if(!this.state.ready) return { ready:false };\n    const def=this.meta(), sid=def.id, date=this.state.date, dt=this.parse(date);\n    const sow=this.startOfWeek(dt); const eow=new Date(sow); eow.setDate(sow.getDate()+6); eow.setHours(23,59,59,999);\n    const inWeek=(d)=> d>=sow && d<=eow;\n    const inMonth=(d)=> d.getMonth()===dt.getMonth() && d.getFullYear()===dt.getFullYear();\n    const fields=this.fieldsOf(sid);\n    const dayEntry=this.entriesOf(sid)[date]||{};\n    const monthlyMeta=this.state.data.meta[sid];\n\n    const tabs=this.DEFAULTS.map(c=>{ const active=c.id===sid; return { id:c.id, name:c.name, tint:active?'#ffffff':c.color, bg:active?c.color:c.accent, shadow:active?('0 4px 12px '+c.color+'55'):'none' }; });\n\n    let principal=fields.find(f=>f.principal && f.type!=='text');\n    if(!principal) principal=fields.find(f=>f.type!=='text');\n    const principalLabel = principal? principal.label : '—';\n\n    const metaUnit=(type)=> type==='money'?'meta/dia R$':type==='pct'?'meta/dia %':'meta/dia';\n    const configRows=fields.map(f=>({\n      key:f.key, label:f.label, type:f.type, meta:f.meta,\n      metaLabel: f.type==='text'?'—':'META/DIA',\n      metaDisabled: f.type==='text', metaColor: f.type==='text'?'#c4cabf':def.color,\n      metaBg: f.type==='text'?'#f3f5f1':'#fff',\n      star: f.principal?'★':'☆', starColor: f.principal?'#e0a400':'#c4cabf',\n      rowBg: f.principal?'#fffaf0':'#fff'\n    }));\n\n    const entryNums=fields.filter(f=>f.type!=='text').map(f=>({ key:f.key, label:f.label, metaText:metaUnit(f.type)+' '+this.fmt(f.meta), value:(dayEntry[f.key]??'') }));\n    const entryTexts=fields.filter(f=>f.type==='text').map(f=>({ key:f.key, label:f.label, value:(dayEntry[f.key]??'') }));\n\n    const kpis=fields.filter(f=>f.type!=='text').map(f=>{\n      if(f.type==='pct'){\n        return { key:f.key, label:f.label, c1:'HOJE', c2:'MÉD.SEM', c3:'MÉD.MÊS',\n          v1:this.fmtT(dayEntry[f.key],'pct'), v2:this.fmtT(this.avgKey(sid,f.key,inWeek)||'', 'pct'), v3:this.fmtT(this.avgKey(sid,f.key,inMonth)||'', 'pct') };\n      }\n      return { key:f.key, label:f.label, c1:'HOJE', c2:'SEMANA', c3:'MÊS',\n        v1:this.fmtT(dayEntry[f.key],f.type), v2:this.fmtT(this.sumKey(sid,f.key,inWeek),f.type), v3:this.fmtT(this.sumKey(sid,f.key,inMonth),f.type) };\n    });\n\n    // GAUGE\n    const gMeta=Number(monthlyMeta)||0;\n    let gVal=0, fill=0, big='–', sub='', pctNum=0;\n    if(principal){\n      if(principal.type==='pct'){\n        gVal=this.latestKey(sid,principal.key,eow); if(gVal==null) gVal=0;\n        fill=gVal/100; big=this.fmt(gVal)+'%'; sub='meta '+this.fmt(gMeta)+'%'; pctNum=gMeta?Math.round((gVal/gMeta)*100):0;\n      } else {\n        gVal=this.sumKey(sid,principal.key,inMonth);\n        fill=gMeta?gVal/gMeta:0; big=this.fmtT(gVal,principal.type); sub='meta '+this.fmtT(gMeta,principal.type); pctNum=gMeta?Math.round((gVal/gMeta)*100):0;\n      }\n    }\n    const len=314.159; const clamp=Math.max(0,Math.min(1,fill));\n    const gauge={ title:principal?('Meta do mês — '+principal.label):'Sem indicador-chave', color:def.color, dash:(clamp*len).toFixed(1)+' '+len.toFixed(1), big, sub, pctText:pctNum+'%' };\n\n    // WEEK BARS\n    const dayNames=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];\n    const raw=[]; let maxV=1;\n    for(let i=0;i<7;i++){ const d=new Date(sow); d.setDate(sow.getDate()+i); const iso=this.iso(d); const e=this.entriesOf(sid)[iso]||{}; let v=principal?Number(e[principal.key]||0):0; raw.push({day:dayNames[i],val:v,isToday:iso===date}); if(v>maxV)maxV=v; }\n    const weekBars=raw.map(b=>({ day:b.day, val:b.val?this.fmt(b.val):'·', h:Math.max(3,Math.round((b.val/maxV)*120)), color:b.isToday?def.color:(b.val?'#9fc98a':'#e7ece3'), dayColor:b.isToday?def.color:'#9aa39c' }));\n\n    // TREND\n    const lastSow=new Date(sow); lastSow.setDate(sow.getDate()-7);\n    const lastEow=new Date(sow); lastEow.setDate(sow.getDate()-1); lastEow.setHours(23,59,59,999);\n    const inLast=(d)=> d>=lastSow && d<=lastEow;\n    let cur=0, prev=0;\n    if(principal){\n      if(principal.type==='pct'){ cur=this.latestKey(sid,principal.key,eow)||0; prev=this.latestKey(sid,principal.key,lastEow)||0; }\n      else { cur=this.sumKey(sid,principal.key,inWeek); prev=this.sumKey(sid,principal.key,inLast); }\n    }\n    let dir='flat', label='Lance os dados para ver a tendência', color='#7c8a83', bg='#eef0ec';\n    if(!(prev===0 && cur===0)){\n      if(cur===prev){ dir='flat'; label='Estável em relação à semana passada'; color='#927611'; bg='#faf4df'; }\n      else if(cur>prev){ dir='up'; label='Estamos MELHORANDO vs. semana passada'; color='#2f7d22'; bg='#eaf5e6'; }\n      else { dir='down'; label='Atenção: PIORANDO vs. semana passada'; color='#b3431a'; bg='#fdeee6'; }\n    }\n    const trend={ dir, label, color, bg, cur:this.fmt(cur), prev:this.fmt(prev), arrow:dir==='up'?'▲':dir==='down'?'▼':'▬' };\n\n    return {\n      ready:true,\n      sector:{ name:def.name, color:def.color, accent:def.accent },\n      cloud: this.state.cloud==='on' ? {text:'Sincronizado na nuvem', color:'#9fe27a'} : this.state.cloud==='off' ? {text:'Offline — salvo no aparelho', color:'#f0b86b'} : {text:'Conectando…', color:'#c6dcc9'},\n      tabs, dateValue:date, monthLabel:dt.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}), weekRange:this.dm(sow)+' – '+this.dm(eow),\n      principalLabel, monthlyMeta,\n      onField:this.setField, onLabel:this.onLabel, onFieldMeta:this.onFieldMeta, onType:this.onType, setPrincipal:this.setPrincipal,\n      addField:this.addField, removeField:this.removeField, onMonthlyMeta:this.onMonthlyMeta, onDate:this.setDate,\n      switchSector:this.switchSector, clearDay:this.clearDay, resetSector:this.resetSector,\n      configRows, entryNums, entryTexts, kpis, gauge, weekBars, trend\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
